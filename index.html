function startWorkout(fromTpl) {
  var date = todayStr();
  ensureDay(date);
  var wid = Date.now();
  var wkt = {id:wid, name:'Тренировка', loc:'gym', startTime:Date.now(), exercises:[]};
  if (fromTpl) {
    wkt.name = fromTpl.name;
    wkt.loc = fromTpl.loc || 'gym';
    (fromTpl.exs || []).forEach(function(e) {
      var ex = makeExFromEntry(e);
      if (typeof e === 'object' && e.sets) {
        var stat = isStatic(ex.name);
        var card = isCardio(ex.name);
        var swm  = isSwim(ex.name);
        ex.sets = [];
        for (var i = 0; i < e.sets; i++)
          ex.sets.push(stat ? {secs:e.reps||60,done:false} : swm ? {dist:e.reps||100, done:false} : card ? {w:0,r:0,dist:3,mins:e.reps||20,done:false} : {w:e.weight||0,r:e.reps||12,done:false});
      }
      wkt.exercises.push(ex);
    });
  }
  ST.w[date].workouts.push(wkt);
  saveST();
  ACTIVE_WKT = {date:date, wid:wid};
  WKT_START = Date.now();
  CUR_DATE = date;
  OPEN_EX = {};
  if (WKT_TIMER_ID) clearInterval(WKT_TIMER_ID);
  WKT_TIMER_ID = setInterval(tickWktTimer, 1000);
  goTab('workout');
}

function finishWorkout() {
  if (!ACTIVE_WKT) return;
  var wkt = getWkt(ACTIVE_WKT.date, ACTIVE_WKT.wid);
  if (wkt) wkt.endTime = Date.now();
  saveST();
  ACTIVE_WKT = null; WKT_START = null;
  if (WKT_TIMER_ID) { clearInterval(WKT_TIMER_ID); WKT_TIMER_ID = null; }
  renderTopbar(); renderWorkout();
}

function tickWktTimer() {
  if (!WKT_START) return;
  var el = document.getElementById('wkt-elapsed');
  if (el) el.textContent = fmtTime(Math.floor((Date.now()-WKT_START)/1000));
  var td = document.getElementById('wkt-timer-disp');
  if (td) td.textContent = fmtTime(Math.floor((Date.now()-WKT_START)/1000));
  updateVolBar();
}
function fmtTime(sec) { return Math.floor(sec/60)+':'+pad(sec%60); }

function updateVolBar() {
  if (!ACTIVE_WKT) return;
  var wkt = getWkt(ACTIVE_WKT.date, ACTIVE_WKT.wid);
  if (!wkt) return;
  var kg = 0, sets = 0;
  (wkt.exercises||[]).forEach(function(ex) {
    (ex.sets||[]).forEach(function(s){ if(s.done){ sets++; kg += (s.w||0)*(s.r||1); } });
  });
  var vkg = document.getElementById('vol-kg'); if (vkg) vkg.textContent = kg;
  var vs = document.getElementById('vol-sets'); if (vs) vs.textContent = sets;
}

function setWktLoc(loc) {
  var ref = curWktRef(); if (!ref) return;
  var wkt = getWkt(ref.date, ref.wid);
  if (!wkt) return;
  wkt.loc = loc; saveST(); renderWorkout();
}

function renderWorkout() {
  var pg = document.getElementById('pg-workout');

  // ── PLAN EDITOR MODE ──
  if (PLAN_WKT && !ACTIVE_WKT) {
    var pw = getWkt(PLAN_WKT.date, PLAN_WKT.wid);
    if (!pw) { PLAN_WKT = null; renderTopbar(); renderWorkout(); return; }
    pg.innerHTML = renderPlanView(pw);
    return;
  }

  if (!ACTIVE_WKT) {
    var ws = getWorkouts(todayStr());
    var plans  = ws.filter(function(w){ return w.planned; });
    var donews = ws.filter(function(w){ return !w.planned; });

    var h = '<div class="inner">' +
      '<div class="sec-badge">Сегодня</div>' +
      '<div class="sec-title" style="margin-bottom:14px">Тренировка</div>';

    h += renderRecoveryCard();
    var rcvActive = ST.recovery && Date.now() < getRecoveryEnd();
    if (!rcvActive) h += buildRecBlock();

    // Планы на сегодня и ближайшие 14 дней
    var allPlans = [];
    for (var _i = 0; _i <= 14; _i++) {
      var _ds = dateOffset(_i);
      var _dp = (ST.w[_ds] && ST.w[_ds].workouts || []).filter(function(w){ return w.planned; });
      _dp.forEach(function(w){ allPlans.push({w:w, date:_ds}); });
    }
    if (allPlans.length > 0) {
      h += '<div style="font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Запланировано</div>';
      var _curDateLabel = '';
      allPlans.forEach(function(item) {
        var lbl = fmtPlanDate(item.date);
        if (lbl !== _curDateLabel) {
          _curDateLabel = lbl;
          h += '<div style="font-size:12px;font-weight:700;color:var(--sub);margin-bottom:5px;margin-top:'+(allPlans.indexOf(item)===0?'0':'10px')+'">'+lbl+'</div>';
        }
        h += planCard(item.w, item.date);
      });
    }

    if (donews.length === 0) {
      h += '<div style="display:flex;gap:8px;margin-bottom:8px">' +
        '<button class="btn btn-acc" style="flex:2;border-radius:14px;height:50px;font-size:15px" onclick="startWorkout()">Начать тренировку</button>' +
        '<button class="btn btn-plan" style="flex:1;border-radius:14px;height:50px;font-size:13px;font-weight:700" onclick="showPlanDateSheet()">📋 План</button>' +
        '</div>';
      if (!rcvActive) h += '<button class="btn btn-full btn-rcv" onclick="startRecovery()" style="border-radius:14px;height:42px">🔋 Рассчитать восстановление</button>';
    } else {
      donews.forEach(function(w) {
        var dur = w.endTime ? fmtTime(Math.floor((w.endTime-w.startTime)/1000)) : '';
        h += '<div class="wkt-idle-card">' +
          '<div style="font-size:28px">'+(w.loc==='pool'?'🌊':'🏋️')+'</div>' +
          '<div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(w.name)+'</div>' +
          '<div style="font-size:12px;color:var(--mut);margin-top:2px">'+(w.exercises||[]).length+' упр.'+(dur?' · '+dur:'')+'</div></div>' +
          '<button onclick="editWorkout(\''+todayStr()+'\','+w.id+')" style="background:none;border:none;font-size:17px;cursor:pointer;padding:4px 4px;-webkit-user-select:none;user-select:none;line-height:1" title="Редактировать">✏️</button>' +
          ((w.exercises||[]).length ? '<button onclick="repeatWorkout(\''+todayStr()+'\','+w.id+')" style="background:none;border:none;color:var(--pur);font-size:18px;cursor:pointer;padding:4px 4px;-webkit-user-select:none;user-select:none;line-height:1" title="Повторить на другую дату">🔁</button>' : '') +
          '<button onclick="deleteWorkout(\''+todayStr()+'\','+w.id+')" style="background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:4px 2px;-webkit-user-select:none;user-select:none;line-height:1">✕</button>' +
          '</div>';
      });
      h += '<div style="display:flex;gap:8px;margin-top:8px">' +
        '<button class="btn btn-acc" style="flex:2;border-radius:14px;height:44px" onclick="startWorkout()">+ Ещё тренировка</button>' +
        '<button class="btn btn-plan" style="flex:1;border-radius:14px;height:44px;font-size:13px;font-weight:700" onclick="showPlanDateSheet()">📋 План</button>' +
        '</div>';
      if (!rcvActive) h += '<button class="btn btn-full btn-rcv" onclick="startRecovery()" style="margin-top:8px;border-radius:14px;height:42px">🔋 Запустить период восстановления</button>';
    }
    h += '</div>';
    pg.innerHTML = h;
    return;
  }

  var wkt = getWkt(ACTIVE_WKT.date, ACTIVE_WKT.wid);
  if (!wkt) { ACTIVE_WKT = null; renderWorkout(); return; }

  var elapsed = WKT_START ? fmtTime(Math.floor((Date.now()-WKT_START)/1000)) : '0:00';
  var kg = 0, sets = 0;
  (wkt.exercises||[]).forEach(function(ex) {
    (ex.sets||[]).forEach(function(s){ if(s.done){ sets++; kg += (s.w||0)*(s.r||1); } });
  });

  var h = '<div class="wkt-head">' +
    '<div class="wkt-actions">' +
    '<div style="min-width:0">' +
    '<div class="sec-badge">Активная тренировка</div>' +
    '<input class="wkt-name-inp" value="'+esc(wkt.name)+'" placeholder="Название" oninput="setActiveName(this.value)" onfocus="this.select()">' +
    '<div class="wkt-timer-row"><div class="wkt-dot"></div><span id="wkt-timer-disp">'+elapsed+'</span>' +
    '<span style="margin-left:6px;color:var(--dim)">· '+(wkt.loc==='pool'?'🌊 Бассейн':'🏋️ Зал')+'</span></div>' +
    '</div>' +
    '<button class="btn btn-red btn-sm" onclick="finishWorkout()" style="flex-shrink:0;white-space:nowrap">✓ Завершить</button>' +
    '</div>' +
    '<div class="wkt-stats">' +
    '<div class="stat-pill"><div class="stat-pill-lbl">Объём</div>' +
    '<div class="stat-pill-val" id="vol-kg">'+kg+'</div></div>' +
    '<div class="stat-pill"><div class="stat-pill-lbl">Подходы</div>' +
    '<div class="stat-pill-val green" id="vol-sets">'+sets+'</div></div>' +
    '</div></div>';

  // Location toggle inside workout
  h += '<div style="display:flex;background:var(--card2);border:1px solid var(--brd2);border-radius:8px;overflow:hidden;margin:0 14px 4px;max-width:560px;margin-left:auto;margin-right:auto">' +
    '<button style="flex:1;padding:7px 12px;font-size:12px;font-weight:700;font-family:inherit;border:none;cursor:pointer;transition:all .15s;'+
    (wkt.loc!=='pool'?'background:rgba(34,197,94,0.2);color:var(--acc)':'background:none;color:var(--sub)')+'" onclick="setWktLoc(\'gym\')">🏋️ Зал</button>' +
    '<button style="flex:1;padding:7px 12px;font-size:12px;font-weight:700;font-family:inherit;border:none;cursor:pointer;transition:all .15s;'+
    (wkt.loc==='pool'?'background:rgba(56,189,248,0.15);color:var(--blu)':'background:none;color:var(--sub)')+'" onclick="setWktLoc(\'pool\')">🌊 Бассейн</button>' +
    '</div>';

  h += '<div class="ex-list">';
  var exs = wkt.exercises || [];
  exs.forEach(function(ex, ei) {
    var doneSets = ex.sets.filter(function(s){return s.done;}).length;
    var mtn    = isMountain(ex.name);
    var cardio = isCardio(ex.name) && !mtn;
    var swim   = isSwim(ex.name);
    var stat   = isStatic(ex.name);
    var color = exTileColor(ex.name);
    var group = exGroup(ex.name);
    var exVol = 0;
    ex.sets.forEach(function(s){ if(s.done) exVol += (s.w||0)*(s.r||1); });

    h += '<div class="ex-card">';
    h += '<div class="ex-card-hd">' +
      '<div class="ex-tile" style="background:'+color+';opacity:0.85">'+letterOf(ex.name)+'</div>' +
      '<div class="ex-info">' +
        '<div class="ex-name">'+esc(exTitle(ex))+'</div>' +
        '<div class="ex-sub">'+(group||'Упражнение')+' · '+doneSets+'/'+ex.sets.length+' подх.</div>' +
      '</div>' +
      (exVol > 0 ? '<div class="ex-vol">'+exVol+' кг</div>' : '') +
      '</div>';

    h += '<div class="ex-body open">';
    h += styleChips(ex, ei);
    if (!cardio && !swim && !stat) {
      var st = getExStats(ex.name);
      if (st) {
        h += '<div class="ex-hist">' +
          '<span>Посл: <span class="ex-hist-val">'+st.lastW+' кг × '+st.lastR+'</span></span>' +
          (st.pr > st.lastW ? '<span>PR: <span class="ex-hist-pr">'+st.pr+' кг</span></span>' : '') +
          '</div>';
      }
      h += '<div class="sets-hdr"><div>№</div><div>Вес</div><div>Повт</div><div></div></div>';
    } else if (stat) {
      h += '<div class="sets-hdr" style="grid-template-columns:26px 1fr 30px"><div>№</div><div>Удержание</div><div></div></div>';
    } else if (swim) {
      h += '<div class="sets-hdr" style="grid-template-columns:26px 1.15fr 0.95fr 30px"><div>№</div><div>Метраж</div><div>Время</div><div></div></div>';
    }
    ex.sets.forEach(function(s, si) {
      if (stat) {
        h += '<div class="set-row'+(s.done?' done':'')+'" style="grid-template-columns:26px 1fr 30px">';
        h += '<div class="set-n">'+(si+1)+'</div>';
        h += '<div class="set-cell'+(s.done?' done':'')+'" onclick="openSheet('+ei+','+si+',\'secs\')">'+(s.secs||60)+'<span class="set-cell-unit">сек</span></div>';
      } else if (swim) {
        h += '<div class="set-row'+(s.done?' done':'')+'" style="grid-template-columns:26px 1.15fr 0.95fr 30px">';
        h += '<div class="set-n">'+(si+1)+'</div>';
        h += '<div class="set-cell'+(s.done?' done':'')+'" onclick="openSheet('+ei+','+si+',\'swimdist\')">'+(s.dist||0)+'<span class="set-cell-unit">м</span></div>';
        h += '<div class="set-cell'+(s.done?' done':'')+'" onclick="openSheet('+ei+','+si+',\'swimtime\')">'+(s.secs ? fmtTime(s.secs) : '<span style="color:var(--dim);font-weight:600;font-size:13px">+ время</span>')+'</div>';
      } else {
        h += '<div class="set-row'+(s.done?' done':'')+'">';
        h += '<div class="set-n">'+(si+1)+'</div>';
        if (cardio) {
          h += '<div class="set-cell'+(s.done?' done':'')+'" onclick="openSheet('+ei+','+si+',\'mins\')">'+(s.mins||20)+'<span class="set-cell-unit">мин</span></div>';
          h += '<div class="set-cell'+(s.done?' done':'')+'" onclick="openSheet('+ei+','+si+',\'dist\')">'+(s.dist||0)+'<span class="set-cell-unit">км</span></div>';
        } else {
          h += '<div class="set-cell'+(s.done?' done':'')+'" onclick="openSheet('+ei+','+si+',\'w\')">'+(s.w||0)+'<span class="set-cell-unit">кг</span></div>';
          h += '<div class="set-cell'+(s.done?' done':'')+'" onclick="openSheet('+ei+','+si+',\'r\')">'+(s.r||0)+'<span class="set-cell-unit">повт</span></div>';
        }
      }
      h += '<div class="set-circle'+(s.done?' done':'')+'" onclick="toggleSetDone('+ei+','+si+')">✓</div>';
      h += '</div>';
    });
    h += '<div class="add-row">' +
      '<button class="add-btn" onclick="addSet('+ei+')">+ Подход</button>' +
      (ex.sets.length>1?'<button class="del-btn" onclick="delSet('+ei+')">− Убрать</button>':'') +
      '</div>';
    var nextSet = -1;
    for (var si = 0; si < ex.sets.length; si++) if (!ex.sets[si].done){ nextSet = si; break; }
    if (nextSet !== -1) {
      var s = ex.sets[nextSet];
      var target = stat ? ((s.secs||60)+' сек') : swim ? ((s.dist||0)+' м'+(s.secs?' · '+fmtTime(s.secs):'')) : cardio ? ((s.mins||20)+' мин') : ((s.w||0)+' кг × '+(s.r||0));
      h += '<button class="set-rec-btn'+(swim?' pool':'')+'" onclick="recordSet('+ei+','+nextSet+')">' +
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>' +
        'Записать подход · '+target+'</button>';
    }
    h += '<button class="rm-ex-btn" onclick="removeEx('+ei+')">Удалить упражнение</button>';
    h += '</div>';
    h += '</div>';
  });

  var addClr = wkt.loc==='pool' ? 'var(--blu)' : 'var(--acc)';
  var addBrd = wkt.loc==='pool' ? 'rgba(56,189,248,0.4)' : 'rgba(34,197,94,0.4)';
  h += '<button class="add-ex-btn" onclick="openDbModal()" style="border-color:'+addBrd+';color:'+addClr+'">' +
    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="'+addClr+'" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>' +
    'Упражнение из базы</button>';
  h += '</div>';
  pg.innerHTML = h;
}

function toggleEx(ei) { OPEN_EX[ei] = !OPEN_EX[ei]; renderWorkout(); }

function toggleSetDone(ei, si) {
  if (!ACTIVE_WKT) return;
  var wkt = getWkt(ACTIVE_WKT.date, ACTIVE_WKT.wid);
  wkt.exercises[ei].sets[si].done = !wkt.exercises[ei].sets[si].done;
  saveST(); updateVolBar(); renderWorkout();
}

function recordSet(ei, si) {
  if (!ACTIVE_WKT) return;
  var wkt = getWkt(ACTIVE_WKT.date, ACTIVE_WKT.wid);
  wkt.exercises[ei].sets[si].done = true;
  saveST(); startRest(90); updateVolBar(); renderWorkout();
}

function addSet(ei) {
  var ref = curWktRef(); if (!ref) return;
  var wkt = getWkt(ref.date, ref.wid);
  var ex = wkt.exercises[ei];
  var last = ex.sets[ex.sets.length-1];
  ex.sets.push(Object.assign({}, last, {done:false}));
  saveST(); renderWorkout();
}
function delSet(ei) {
  var ref = curWktRef(); if (!ref) return;
  var wkt = getWkt(ref.date, ref.wid);
  var ex = wkt.exercises[ei];
  if (ex.sets.length > 1) { ex.sets.pop(); saveST(); renderWorkout(); }
}
function removeEx(ei) {
  var ref = curWktRef(); if (!ref) return;
  var wkt = getWkt(ref.date, ref.wid);
  wkt.exercises.splice(ei, 1);
  delete OPEN_EX[ei];
  saveST(); renderWorkout();
}
function addExToWorkout(name) {
  var ref = curWktRef(); if (!ref) return;
  var wkt = getWkt(ref.date, ref.wid);
  var ex = makeEx(name);
  wkt.exercises.push(ex);
  saveST(); dbClose(); renderWorkout();
  setTimeout(function(){
    var pg = document.getElementById('pg-workout');
    if (pg) pg.scrollTop = pg.scrollHeight;
  }, 80);
}

// ═══════════════════════ REST TIMER ═══════════════════════
function startRest(sec) {
  REST_SEC = sec; REST_TOTAL = sec; REST_RUNNING = true;
  document.getElementById('rest-bar').classList.add('vis');
  updateRestDisplay();
  if (REST_ID) clearInterval(REST_ID);
  REST_ID = setInterval(tickRest, 1000);
}
function tickRest() {
  if (!REST_RUNNING) return;
  REST_SEC--;
  if (REST_SEC <= 0) { restStop(); return; }
  updateRestDisplay();
}
function updateRestDisplay() {
  document.getElementById('rest-time').textContent = fmtTime(REST_SEC);
  document.getElementById('rest-tog').textContent = REST_RUNNING ? '⏸' : '▶';
  var ratio = REST_TOTAL > 0 ? Math.max(0,Math.min(1,REST_SEC/REST_TOTAL)) : 0;
  var arc = document.getElementById('rest-ring-arc');
  if (arc) arc.setAttribute('stroke-dashoffset', String(113*(1-ratio)));
}
function restToggle() { REST_RUNNING = !REST_RUNNING; document.getElementById('rest-tog').textContent = REST_RUNNING?'⏸':'▶'; }
function restAdd(sec) {
  REST_SEC += sec; REST_TOTAL = Math.max(REST_TOTAL, REST_SEC);
  if (!REST_RUNNING) { REST_RUNNING = true; if (!REST_ID) REST_ID = setInterval(tickRest,1000); }
  updateRestDisplay();
}
function restStop() {
  REST_RUNNING = false; REST_SEC = 0;
  if (REST_ID) { clearInterval(REST_ID); REST_ID = null; }
  document.getElementById('rest-bar').classList.remove('vis');
}

// ═══════════════════════ BOTTOM SHEET (DRUM PICKER) ═══════════════════════
function openSheet(ei, si, field) {
  var ref = curWktRef(); if (!ref) return;
  var wkt = getWkt(ref.date, ref.wid);
  var s = wkt.exercises[ei].sets[si];
  SH_MODE = {ei:ei, si:si, field:field};
  var presets = [], range = [], step = 1, cur = 0, unit = '';
  if (field === 'w') {
    cur = s.w||0; step = 2.5; unit = 'кг';
    for (var v=0; v<=300; v+=2.5) range.push(Math.round(v*10)/10);
    presets = [[-5,'−5'],[- 2.5,'−2,5'],[2.5,'+2,5'],[5,'+5']];
    document.getElementById('sh-title').textContent = 'Вес (кг)';
  } else if (field === 'r') {
    cur = s.r||0; step = 1; unit = 'повт';
    for (var v=0; v<=50; v++) range.push(v);
    presets = [[-2,'−2'],[-1,'−1'],[1,'+1'],[2,'+2']];
    document.getElementById('sh-title').textContent = 'Повторения';
  } else if (field === 'mins') {
    cur = s.mins||20; step = 1; unit = 'мин';
    for (var v=1; v<=120; v++) range.push(v);
    presets = [[-5,'−5'],[-1,'−1'],[1,'+1'],[5,'+5']];
    document.getElementById('sh-title').textContent = 'Время (мин)';
  } else if (field === 'dist') {
    cur = s.dist||0; step = 0.5; unit = 'км';
    for (var v=0; v<=50; v+=0.5) range.push(Math.round(v*10)/10);
    presets = [[-1,'−1'],[-0.5,'−0,5'],[0.5,'+0,5'],[1,'+1']];
    document.getElementById('sh-title').textContent = 'Дистанция (км)';
  } else if (field === 'incline') {
    cur = s.incline||0; step = 1; unit = '%';
    for (var v=0; v<=50; v++) range.push(v);
    presets = [[-5,'−5'],[-1,'−1'],[1,'+1'],[5,'+5']];
    document.getElementById('sh-title').textContent = 'Наклон (% grade)';
  } else if (field === 'secs') {
    cur = s.secs||60; step = 5; unit = 'сек';
    for (var v=5; v<=300; v+=5) range.push(v);
    presets = [[-15,'−15'],[-5,'−5'],[5,'+5'],[15,'+15']];
    document.getElementById('sh-title').textContent = 'Удержание (сек)';
  } else if (field === 'swimdist') {
    cur = s.dist||100; step = 25; unit = 'м';
    for (var v=0; v<=3000; v+=25) range.push(v);
    presets = [[-50,'−50'],[-25,'−25'],[25,'+25'],[50,'+50']];
    document.getElementById('sh-title').textContent = 'Метраж (м)';
  } else if (field === 'swimtime') {
    cur = s.secs||60; step = 5; unit = '';
    for (var v=0; v<=3600; v+=5) range.push(v);
    presets = [[-30,'−30с'],[-5,'−5с'],[5,'+5с'],[30,'+30с']];
    document.getElementById('sh-title').textContent = 'Время (мин:сек) · 0:00 — без времени';
  }
  SH_RANGE = range; SH_VAL = cur; SH_STEP = step;
  SH_FMT = (field === 'swimtime') ? fmtTime : nf;
  document.getElementById('sh-val-unit').textContent = unit;
  document.getElementById('sh-manual-unit').textContent = unit;
  var ph = document.getElementById('sh-presets');
  ph.innerHTML = presets.map(function(p){
    return '<button class="preset" onclick="shPreset('+p[0]+')">'+p[1]+'</button>';
  }).join('');
  var drum = document.getElementById('sh-drum');
  drum.innerHTML = range.map(function(v){ return '<div class="drum-item">'+SH_FMT(v)+'</div>'; }).join('');
  shUpdateDisplay();
  applyInputMode(false);
  document.getElementById('sh-overlay').classList.add('vis');
  setTimeout(function(){
    var idx = range.indexOf(cur);
    if (idx === -1) { var best=0; for(var i=0;i<range.length;i++) if(Math.abs(range[i]-cur)<Math.abs(range[best]-cur)) best=i; idx=best; }
    drum.scrollTop = idx * 48;
    if (getInputMode() !== 'manual' || field === 'swimtime') SH_VAL = range[idx];
    highlightDrum();
    shUpdateDisplay();
  }, 50);
}
function shUpdateDisplay() {
  var unitEl = document.getElementById('sh-val-unit');
  var unit = unitEl ? unitEl.textContent : '';
  document.getElementById('sh-val-display').innerHTML = (SH_FMT||nf)(SH_VAL)+' <span class="sh-val-unit" id="sh-val-unit">'+unit+'</span>';
}
function getInputMode() { return (ST.cfg && ST.cfg.inputMode === 'manual') ? 'manual' : 'drum'; }
function setInputMode(mode) {
  if (!ST.cfg) ST.cfg = {};
  ST.cfg.inputMode = mode; saveST();
  applyInputMode(true);
  // При возврате к барабану подкручиваем его к текущему значению
  if (mode === 'drum' && !(SH_MODE && SH_MODE.field === 'swimtime') && SH_RANGE.length) {
    var best = 0;
    for (var i=0;i<SH_RANGE.length;i++) if (Math.abs(SH_RANGE[i]-SH_VAL) < Math.abs(SH_RANGE[best]-SH_VAL)) best = i;
    SH_VAL = SH_RANGE[best];
    var drum = document.getElementById('sh-drum');
    if (drum) drum.scrollTop = best * 48;
    highlightDrum(); shUpdateDisplay();
  }
}
function applyInputMode(focusIt) {
  var isTime = SH_MODE && SH_MODE.field === 'swimtime';
  var manual = !isTime && getInputMode() === 'manual';
  var modeRow = document.getElementById('sh-mode');
  if (modeRow) modeRow.style.display = isTime ? 'none' : 'flex';
  var bd = document.getElementById('sh-mode-drum'), bm = document.getElementById('sh-mode-manual');
  if (bd) bd.className = manual ? '' : 'on';
  if (bm) bm.className = manual ? 'on' : '';
  var dw = document.getElementById('sh-drum-wrap'), mw = document.getElementById('sh-manual-wrap'), disp = document.getElementById('sh-val-display');
  if (manual) {
    if (dw) dw.style.display = 'none';
    if (mw) mw.style.display = 'flex';
    if (disp) disp.style.display = 'none';
    var inp = document.getElementById('sh-manual-input');
    if (inp) {
      inp.step = SH_STEP || 1;
      inp.value = Math.round(SH_VAL*100)/100;
      if (focusIt) setTimeout(function(){ inp.focus(); inp.select(); }, 60);
    }
  } else {
    if (dw) dw.style.display = 'block';
    if (mw) mw.style.display = 'none';
    if (disp) disp.style.display = 'block';
  }
}
function shManualInput() {
  var inp = document.getElementById('sh-manual-input');
  var v = parseFloat(inp.value);
  if (!isNaN(v)) SH_VAL = v;
}
function drumScroll() {
  var drum = document.getElementById('sh-drum');
  var idx = Math.round(drum.scrollTop/48);
  idx = Math.max(0,Math.min(idx,SH_RANGE.length-1));
  SH_VAL = SH_RANGE[idx];
  highlightDrum();
  shUpdateDisplay();
}
function highlightDrum() {
  var drum = document.getElementById('sh-drum');
  var items = drum.querySelectorAll('.drum-item');
  var idx = SH_RANGE.indexOf(SH_VAL);
  items.forEach(function(el,i){
    el.style.color = i===idx ? 'var(--txt)' : 'var(--dim)';
    el.style.fontSize = i===idx ? '32px' : '26px';
  });
}
function shPreset(delta) {
  if (getInputMode() === 'manual' && !(SH_MODE && SH_MODE.field === 'swimtime')) {
    SH_VAL = Math.max(0, Math.round((SH_VAL+delta)*100)/100);
    var inp = document.getElementById('sh-manual-input');
    if (inp) inp.value = SH_VAL;
    return;
  }
  var next = Math.round((SH_VAL+delta)*100)/100;
  next = Math.max(SH_RANGE[0], Math.min(SH_RANGE[SH_RANGE.length-1], next));
  var best=0; for(var i=0;i<SH_RANGE.length;i++) if(Math.abs(SH_RANGE[i]-next)<Math.abs(SH_RANGE[best]-next)) best=i;
  SH_VAL = SH_RANGE[best];
  document.getElementById('sh-drum').scrollTop = best*48;
  highlightDrum();
}
function shClose(e) {
  if (!e || e.target===document.getElementById('sh-overlay'))
    document.getElementById('sh-overlay').classList.remove('vis'), SH_MODE=null;
}
function shConfirm() {
  var ref = curWktRef();
  if (!SH_MODE || !ref) { shClose(); return; }
  var wkt = getWkt(ref.date, ref.wid);
  var key = SH_MODE.field;
  if (key === 'swimtime') key = 'secs';
  else if (key === 'swimdist') key = 'dist';
  var val = (typeof SH_VAL === 'number' && !isNaN(SH_VAL)) ? SH_VAL : 0;
  val = Math.max(0, Math.round(val*100)/100);
  wkt.exercises[SH_MODE.ei].sets[SH_MODE.si][key] = val;
  saveST();
  document.getElementById('sh-overlay').classList.remove('vis');
  SH_MODE = null;
  renderWorkout();
}

// ═══════════════════════ EXERCISE DB MODAL ═══════════════════════
function openDbModal(cb) {
  DB_CB = cb || addExToWorkout;
  DB_FILTER = null;
  // Режим (зал/бассейн) — из редактора шаблона или из текущей тренировки/плана
  if (cb === editorAddEx && typeof EDITOR_TPL !== 'undefined' && EDITOR_TPL) {

  } else {

  }
  document.getElementById('db-search').value = '';

  renderDbChips(); dbRender();

function dbClose(e) {
  if (!e || e.target===document.getElementById('db-modal'))
    document.getElementById('db-modal').classList.remove('vis');
}
function dbModeFilters() {
  return DB_MUSCLE_FILTERS.filter(function(f){ return DB_POOL ? f.key==='Плавание' : f.key!=='Плавание'; });
}
function renderDbChips() {
  document.getElementById('db-chips').innerHTML = dbModeFilters().map(function(f){
    return '<button class="db-chip'+(DB_FILTER===f.key?' on':'')+'" onclick="dbFilter(\''+f.key+'\')">'+f.icon+' '+f.label+'</button>';
  }).join('');
}
function dbFilter(key) { DB_FILTER = DB_FILTER===key?null:key; renderDbChips(); dbRender(); }

function dbExsForGroup(groupKey) {
  // Map UI filter key → actual DB group name
  var dbGroup = groupKey;
  if (groupKey==='Плавание') dbGroup = 'Стили';
  var results = [];
  DB_SECTIONS.forEach(function(sec){
    var exs = sec.groups[dbGroup];
    if (exs) exs.forEach(function(name){ results.push({name:name, icon:sec.icon}); });
  });
  return results;
}

function dbRender() {
  var q = (document.getElementById('db-search').value||'').toLowerCase().trim();
  var list = document.getElementById('db-list');
  var html = '';

  function renderEx(ex) {
    return '<div class="db-item" onclick="DB_CB(\''+ex.name.replace(/'/g,"\\'")+'\')">'+
      '<div class="db-item-name">'+esc(ex.name)+'</div>'+
      '<span style="font-size:16px">'+ex.icon+'</span></div>';
  }

  if (DB_FILTER) {
    var exs = dbExsForGroup(DB_FILTER).filter(function(e){ return !q||e.name.toLowerCase().indexOf(q)!==-1; });
    html = exs.length ? exs.map(renderEx).join('') : '<div class="empty" style="padding:20px">Ничего не найдено</div>';
  } else {
    dbModeFilters().forEach(function(f){
      var exs = dbExsForGroup(f.key).filter(function(e){ return !q||e.name.toLowerCase().indexOf(q)!==-1; });
      if (!exs.length) return;
      html += '<div class="db-sec-hd">'+f.icon+' '+f.label+'</div>';
      html += exs.map(renderEx).join('');
    });
    if (!html) html = '<div class="empty" style="padding:20px">Ничего не найдено</div>';
  }
  list.innerHTML = html;
}

// ═══════════════════════ CALENDAR ═══════════════════════
function renderCal() {
  var now = new Date();
  if (CAL_YEAR === undefined) { CAL_YEAR = now.getFullYear(); CAL_MONTH = now.getMonth(); }
  var today = todayStr();
  var months = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  document.getElementById('cal-month-lbl').textContent = months[CAL_MONTH]+' '+CAL_YEAR;

  // Stats
  var gymCnt = 0, poolCnt = 0;
  Object.keys(ST.w).forEach(function(ds){
    var day = ST.w[ds];
    if (day && day.workouts) day.workouts.forEach(function(w){ if(w.loc==='pool') poolCnt++; else gymCnt++; });
  });
  var total = gymCnt+poolCnt;
  document.getElementById('cal-stat').textContent = total+' '+(total===1?'тренировка':total<5?'тренировки':'тренировок')+' · '+gymCnt+' в зале · '+poolCnt+' в бассейне';

  var firstDay = new Date(CAL_YEAR, CAL_MONTH, 1);
  var lastDay = new Date(CAL_YEAR, CAL_MONTH+1, 0);
  var startDow = (firstDay.getDay()+6)%7;
  var dows = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  var h = dows.map(function(d){ return '<div class="cal-dow">'+d+'</div>'; }).join('');
  for (var i=0; i<startDow; i++) {
    var pd = new Date(CAL_YEAR,CAL_MONTH,1-startDow+i);
    h += calCell(pd.getDate(), pd.getFullYear()+'-'+pad(pd.getMonth()+1)+'-'+pad(pd.getDate()), today, false);
  }
  for (var d=1; d<=lastDay.getDate(); d++) {
    h += calCell(d, CAL_YEAR+'-'+pad(CAL_MONTH+1)+'-'+pad(d), today, true);
  }
  var total2 = startDow+lastDay.getDate();
  var endPad = total2%7 ? 7-(total2%7) : 0;
  for (var i=1; i<=endPad; i++) {
    var nd = new Date(CAL_YEAR,CAL_MONTH+1,i);
    h += calCell(i, nd.getFullYear()+'-'+pad(nd.getMonth()+1)+'-'+pad(nd.getDate()), today, false);
  }
  document.getElementById('cal-grid').innerHTML = h;

  var LEGEND = [
    {color:'#f59e0b', label:'Ноги'},
    {color:'#22c55e', label:'Грудь'},
    {color:'#38bdf8', label:'Спина'},
    {color:'#a855f7', label:'Плечи'},
    {color:'#ec4899', label:'Руки'},
    {color:'#06b6d4', label:'Плавание'},
    {color:'#6366f1', label:'Кардио'},
    {color:'#f43f5e', label:'Статика'},
    {color:'#71717a', label:'Отдых'}
  ];
  document.getElementById('cal-legend').innerHTML = LEGEND.map(function(l){
    return '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:'+l.color+'"></div>'+l.label+'</div>';
  }).join('');

  renderCalDetail();
}
function calCell(num, ds, today, curMonth) {
  var day = ST.w[ds];
  var hasGym=false, hasPool=false, isRest=false;
  if (day&&day.workouts) day.workouts.forEach(function(w){ if(w.loc==='pool') hasPool=true; else hasGym=true; });
  if (day&&day.type==='rest') isRest=true;
  var cls = 'cal-cell';
  if (curMonth) cls += ' cur';
  if (ds===today) cls += ' today';
  if (ds===SEL_DATE) cls += ' sel';
  if (hasGym||hasPool||isRest) cls += ' has-w';
  var dots = getDayDots(ds);
  var dot = '';
  if (dots.length) {
    dot = '<div style="display:flex;gap:2px;align-items:center;justify-content:center">' +
      dots.map(function(c){ return '<div style="width:6px;height:6px;border-radius:50%;background:'+c+'"></div>'; }).join('') +
      '</div>';
  }
  return '<div class="'+cls+'" onclick="calSelect(\''+ds+'\')"><span>'+num+'</span>'+dot+'</div>';
}
function calShift(dir) {
  CAL_MONTH += dir;
  if (CAL_MONTH>11){CAL_MONTH=0;CAL_YEAR++;} if (CAL_MONTH<0){CAL_MONTH=11;CAL_YEAR--;}
  renderCal();
}
function calSelect(ds) { SEL_DATE = ds===SEL_DATE?null:ds; renderCal(); }
function renderCalDetail() {
  var el = document.getElementById('cal-detail');
  if (!SEL_DATE) { el.innerHTML = ''; return; }
  var day = ST.w[SEL_DATE];
  var h = '<div class="cal-detail"><div class="cal-det-title">📅 '+dateLabel(SEL_DATE)+'</div>';
  if (!day||(!day.workouts&&day.type!=='rest')) {
    h += '<div style="color:var(--sub);font-size:14px;margin-bottom:4px">Нет записей</div>';
  } else if (day.type==='rest') {
    h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">' +
      '<div style="color:var(--sub);font-size:14px;flex:1">День отдыха 💤</div>' +
      '<button onclick="clearRest(\''+SEL_DATE+'\')" style="background:none;border:none;color:var(--red);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;padding:4px 8px;border-radius:8px;border:1px solid rgba(244,63,94,0.25)">Убрать</button>' +
      '</div>';
  } else {
    day.workouts.forEach(function(w, wi){
      var canRepeat = (w.exercises||[]).length > 0 && !w.planned;
      var icoStyle = 'background:none;border:none;font-size:15px;cursor:pointer;padding:4px 7px;border-radius:8px;border:1px solid rgba(167,139,250,0.3);white-space:nowrap;flex-shrink:0;line-height:1';
      h += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">' +
        '<div style="font-size:13px;font-weight:700;color:var(--sub);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(w.loc==='pool'?'🌊':'🏋️')+' '+esc(w.name)+(w.planned?' <span style="color:var(--pur);font-weight:600">· план</span>':'')+'</div>' +
        '<button onclick="editWorkout(\''+SEL_DATE+'\','+w.id+')" title="Редактировать" style="'+icoStyle+'">✏️</button>' +
        (canRepeat ? '<button onclick="repeatWorkout(\''+SEL_DATE+'\','+w.id+')" title="Повторить на другую дату" style="'+icoStyle+'">🔁</button>' : '') +
        '<button onclick="removeCalWorkout(\''+SEL_DATE+'\','+wi+')" style="background:none;border:none;color:var(--red);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;padding:4px 8px;border-radius:8px;border:1px solid rgba(244,63,94,0.25);white-space:nowrap;flex-shrink:0">Удалить</button>' +
        '</div>';
      (w.exercises||[]).forEach(function(ex){
        var done = ex.sets.filter(function(s){return s.done;}).length;
        var maxW = 0; ex.sets.forEach(function(s){ if((s.w||0)>maxW) maxW=s.w||0; });
        h += '<div class="cal-ex-row"><div class="cal-ex-name">'+esc(exTitle(ex))+'</div>' +
          '<div class="cal-ex-meta">'+done+' подх.'+(maxW?' · '+maxW+' кг':'')+'</div></div>';
      });
    });
  }
  var isFuture = SEL_DATE > todayStr();
  var isToday  = SEL_DATE === todayStr();
  h += '<div style="display:flex;gap:8px;margin-top:12px">' +
    '<button class="btn btn-sm" onclick="markRest(\''+SEL_DATE+'\')" style="flex:1">💤 Отдых</button>' +
    (isFuture
      ? '<button class="btn btn-sm btn-plan" onclick="createPlan(null,\''+SEL_DATE+'\');goTab(\'workout\')" style="flex:1">📋 Запланировать</button>'
      : isToday
        ? '<button class="btn btn-acc btn-sm" onclick="startOnDate(\''+SEL_DATE+'\')" style="flex:1">▶ Начать</button>'
        : '<button class="btn btn-sm btn-plan" onclick="logWorkout(\''+SEL_DATE+'\')" style="flex:1">📝 Записать</button>'
    ) +
    '</div></div>';
  el.innerHTML = h;
}
function markRest(ds) {
  if (!ST.w[ds]) ST.w[ds]={type:'rest',workouts:[]}; else ST.w[ds].type='rest';
  saveST(); renderCalDetail(); renderCal();
}
function clearRest(ds) {
  if (ST.w[ds]) { delete ST.w[ds].type; if (!(ST.w[ds].workouts||[]).length) delete ST.w[ds]; }
  saveST(); renderCalDetail(); renderCal();
}
function removeCalWorkout(ds, wi) {
  if (!ST.w[ds]||!ST.w[ds].workouts) return;
  ST.w[ds].workouts.splice(wi, 1);
  if (!ST.w[ds].workouts.length && ST.w[ds].type!=='rest') delete ST.w[ds];
  saveST(); renderCalDetail(); renderCal();
}
function startOnDate(ds) {
  if (ds===todayStr()) { startWorkout(); goTab('workout'); }
  else { logWorkout(ds); }
}

// Дозаписать прошлую тренировку: создаём запись с датой того дня и открываем редактор
function logWorkout(ds) {
  ensureDay(ds);
  var wid = Date.now();
  var t = new Date(ds + 'T12:00:00').getTime();
  ST.w[ds].workouts.push({id:wid, name:'Тренировка', loc:'gym', startTime:t, endTime:t, exercises:[]});
  saveST();
  PLAN_WKT = {date:ds, wid:wid};
  OPEN_EX = {};
  goTab('workout');
  renderTopbar(); renderWorkout();
}

var TPL_COLORS = ['#22c55e','#38bdf8','#f59e0b','#a78bfa','#f43f5e','#fb923c','#34d399','#60a5fa'];
function tplColor(name) {
  var h = 0; for(var i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))&0x7fffffff;
  return TPL_COLORS[h % TPL_COLORS.length];
}

function renderTemplates() {
  var body = document.getElementById('tpl-body');
  var h = '<div class="sec-badge">Программы</div><div class="sec-title" style="margin-bottom:16px">Шаблоны</div>';

    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>' +
    'Создать свой шаблон</button>';

    var names = (exs||[]).slice(0,3).map(function(e){ return typeof e==='string'?e:e.name; });

    var txt = names.join(' · ');

    return '<div style="font-size:12px;color:var(--sub);margin-top:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(txt)+'</div>';
  }

  if (ST.templates.length > 0) {
    h += '<div style="font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Мои шаблоны</div>';
    ST.templates.forEach(function(tpl, ti){
      var color = tplColor(tpl.name);
      h += '<div class="tpl-card" style="cursor:default">' +
        '<div class="tpl-tile" style="background:'+color+'">'+letterOf(tpl.name)+'</div>' +
        '<div style="flex:1;min-width:0" onclick="useTpl(null,'+ti+')">' +
          '<div class="tpl-name">'+esc(tpl.name)+'</div>' +
          '<div class="tpl-meta">'+(tpl.exs||[]).length+' упражнений</div>' +
          tplExPreview(tpl.exs) +
          '<span class="tpl-badge '+(tpl.loc||'gym')+'">'+((tpl.loc||'gym')==='pool'?'🌊 Бассейн':'🏋️ Зал')+'</span>' +
        '</div>' +
        '<div style="display:flex;gap:6px">' +
          '<button onclick="editTpl('+ti+')" style="background:none;border:none;color:var(--sub);font-size:18px;cursor:pointer;padding:4px">✏️</button>' +
          '<button onclick="delTpl('+ti+')" style="background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:4px">✕</button>' +
        '</div></div>';
    });
    h += '<div style="height:16px"></div>';
  }

  var rec = getRecommendation();
  h += '<div style="font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Готовые программы</div>';
  BUILT_IN.forEach(function(tpl){
    var color = tplColor(tpl.name);
    var recScore = rec.score(tpl);
    h += '<div class="tpl-card" onclick="useTpl(\''+tpl.id+'\')">' +
      '<div class="tpl-tile" style="background:'+color+'">'+letterOf(tpl.name)+'</div>' +
      '<div style="flex:1;min-width:0">' +
        '<div class="tpl-name">'+esc(tpl.name)+'</div>' +

        tplExPreview(tpl.exs) +

          '<span class="tpl-badge '+tpl.loc+'">'+((tpl.loc||'gym')==='pool'?'🌊 Бассейн':'🏋️ Зал')+'</span>' +
          (recScore > 0 ? '<span class="tpl-badge" style="background:rgba(34,197,94,0.12);color:var(--acc)">⚡ Сегодня</span>' : '') +
        '</div>' +

function showPlanTplPicker() {
  if (!PLAN_WKT) return;
  closePlanTplPicker();
  var cw = getWkt(PLAN_WKT.date, PLAN_WKT.wid);
  var poolMode = !!(cw && cw.loc === 'pool');
  var hdr = function(t){ return '<div style="font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin:6px 0 8px">'+t+'</div>'; };
  var items = '';

  var myRows = '';
  (ST.templates||[]).forEach(function(t, i){
    if (poolMode !== ((t.loc||'gym')==='pool')) return;
    myRows += tplPickRow('applyTplToPlan('+i+',false)', t.name, t.exs, t.loc);
  });
  if (myRows) items += hdr('Мои шаблоны') + myRows;

  var biRows = '';
  BUILT_IN.forEach(function(t, i){
    if (poolMode !== ((t.loc||'gym')==='pool')) return;
    biRows += tplPickRow('applyTplToPlan('+i+',true)', t.name, t.exs, t.loc);
  });
  if (biRows) items += hdr('Готовые программы') + biRows;

  if (!items) items = '<div style="text-align:center;color:var(--mut);padding:28px 12px;font-size:14px">Нет шаблонов для '+(poolMode?'бассейна':'зала')+'</div>';

  var overlay = document.createElement('div');
  overlay.id = 'plan-tpl-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9100;display:flex;align-items:flex-end;justify-content:center';
  overlay.innerHTML =
    '<div style="background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:480px;box-sizing:border-box;max-height:82vh;display:flex;flex-direction:column">' +
      '<div style="padding:16px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">' +
        '<div style="font-size:17px;font-weight:800;color:var(--txt)">Шаблоны · '+(poolMode?'🌊 Бассейн':'🏋️ Зал')+'</div>' +
        '<button onclick="closePlanTplPicker()" style="background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:6px;line-height:1;-webkit-user-select:none;user-select:none">✕</button>' +
      '</div>' +
      '<div style="overflow-y:auto;padding:0 16px calc(env(safe-area-inset-bottom) + 16px);-webkit-overflow-scrolling:touch">' + items + '</div>' +
    '</div>';
  overlay.addEventListener('click', function(e){ if (e.target===overlay) closePlanTplPicker(); });
  document.body.appendChild(overlay);
}

function applyTplToPlan(idx, isBuiltin) {
  if (!PLAN_WKT) return;
  var tpl = isBuiltin ? BUILT_IN[idx] : ST.templates[idx];
  if (!tpl) return;
  var wkt = getWkt(PLAN_WKT.date, PLAN_WKT.wid);
  if (!wkt) return;
  if (tpl.loc) wkt.loc = tpl.loc;
  if (!wkt.name || wkt.name === 'Тренировка') wkt.name = tpl.name;
  (tpl.exs || []).forEach(function(e){ wkt.exercises.push(makeExFromEntry(e)); });
  saveST();
  closePlanTplPicker();
  // Раскрываем все упражнения, чтобы сразу было видно содержимое шаблона
  OPEN_EX = {};
  wkt.exercises.forEach(function(_, i){ OPEN_EX[i] = true; });
  renderWorkout();
}

function closePlanTplPicker() {
  var el = document.getElementById('plan-tpl-overlay');
  if (el) el.remove();
}
function delTpl(ti) {
  if (!confirm('Удалить шаблон?')) return;
  ST.templates.splice(ti,1); saveST(); renderTemplates();
}

// ═══════════════════════ TEMPLATE EDITOR ═══════════════════════
function newCustomTpl() {
  EDITOR_TPL = {name:'', loc:'gym', exs:[]};
  EDITOR_IDX = -1;
  openEditor();
}
function editTpl(ti) {
  var t = ST.templates[ti];
  EDITOR_TPL = {name:t.name, loc:t.loc||'gym', exs:(t.exs||[]).map(function(e){
    if (typeof e==='string') return {name:e,sets:3,reps:12,weight:0};
    return Object.assign({sets:3,reps:12,weight:0},e);
  })};
  EDITOR_IDX = ti;
  openEditor();
}
function openEditor() {
  document.getElementById('editor-name').value = EDITOR_TPL.name;
  updateEditorLoc();
  renderEditorExs();
  document.getElementById('tpl-editor').classList.add('vis');
  setTimeout(function(){ document.getElementById('editor-name').focus(); }, 100);
}
function editorClose() {
  document.getElementById('tpl-editor').classList.remove('vis');
  EDITOR_TPL = null; EDITOR_IDX = -1;
}
function editorSave() {
  var name = document.getElementById('editor-name').value.trim();
  if (!name) { document.getElementById('editor-name').focus(); return; }
  EDITOR_TPL.name = name;
  var tpl = {name:EDITOR_TPL.name, loc:EDITOR_TPL.loc, exs:EDITOR_TPL.exs};
  if (EDITOR_IDX >= 0) ST.templates[EDITOR_IDX] = tpl;
  else ST.templates.push(tpl);
  saveST(); editorClose(); renderTemplates();
}
function editorSetLoc(loc) {
  EDITOR_TPL.loc = loc; updateEditorLoc();
}
function updateEditorLoc() {
  var g = document.getElementById('eloc-gym');
  var p = document.getElementById('eloc-pool');
  if (!g||!p) return;
  g.className = 'loc-tog-btn'+(EDITOR_TPL.loc==='gym'?' on-gym':'');
  p.className = 'loc-tog-btn'+(EDITOR_TPL.loc==='pool'?' on-pool':'');
}
function editorAddEx(name) {
  if (!EDITOR_TPL) return;
  var stat = isStatic(name);
  var card = isCardio(name);
  var swim = isSwim(name);
  EDITOR_TPL.exs.push(stat ? {name:name,sets:3,reps:60} : swim ? {name:name,sets:1,reps:100} : card ? {name:name,sets:1,reps:20} : {name:name,sets:3,reps:12,weight:0});
  dbClose(); renderEditorExs();
}
function editorRemoveEx(i) { EDITOR_TPL.exs.splice(i,1); renderEditorExs(); }
function editorStep(i, field, delta) {
  var ex = EDITOR_TPL.exs[i];
  if (field==='sets') ex.sets = Math.max(1, (ex.sets||3)+delta);
  if (field==='reps') ex.reps = Math.max(1, (ex.reps||12)+delta);
  if (field==='weight') ex.weight = Math.max(0, Math.round(((ex.weight||0)+delta)*10)/10);
  renderEditorExs();
}
function renderEditorExs() {
  var cnt = (EDITOR_TPL.exs||[]).length;
  document.getElementById('editor-sub').textContent = cnt ? cnt+' упражнений' : 'Добавьте упражнения из базы';
  var h = '';
  (EDITOR_TPL.exs||[]).forEach(function(ex,i){
    var color = exTileColor(ex.name);
    var group = exGroup(ex.name);
    var isC = isCardio(ex.name);
    var isSw = isSwim(ex.name);
    var isS = isStatic(ex.name);
    h += '<div class="editor-ex-card">' +
      '<div class="editor-ex-hd">' +
        '<div class="ex-tile" style="background:'+color+';opacity:0.85;width:34px;height:34px;font-size:14px">'+letterOf(ex.name)+'</div>' +
        '<div class="ex-info"><div class="ex-name">'+esc(ex.name)+'</div><div class="ex-sub">'+(group||'')+'</div></div>' +
        '<button class="rm-tile-btn" onclick="editorRemoveEx('+i+')">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#71717a" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>' +
        '</button>' +
      '</div>' +
      '<div class="editor-steppers">';
    if (isS) {
      h += stepperBox(i,'sets',ex.sets||3,'Подходы');
      h += stepperBox(i,'reps',ex.reps||60,'Секунды',5);
    } else if (isSw) {
      h += stepperBox(i,'sets',ex.sets||1,'Подходы');
      h += stepperBox(i,'reps',ex.reps||100,'Метры',25);
    } else if (!isC) {
      h += stepperBox(i,'sets',ex.sets||3,'Подходы');
      h += stepperBox(i,'reps',ex.reps||12,'Повторы');
      h += stepperBox(i,'weight',ex.weight||0,'Вес кг',2.5);
    } else {
      h += stepperBox(i,'reps',ex.reps||20,'Минуты',5);
    }
    h += '</div></div>';
  });
  document.getElementById('editor-exs').innerHTML = h;
}
function stepperBox(i, field, val, lbl, step) {
  step = step||1;
  return '<div class="stepper-box">' +
    '<div class="stepper-lbl">'+lbl+'</div>' +
    '<div class="stepper-row">' +
      '<button class="stepper-btn" onclick="editorStep('+i+',\''+field+'\','+(-(step))+')">−</button>' +
      '<div class="stepper-val">'+nf(val)+'</div>' +
      '<button class="stepper-btn" onclick="editorStep('+i+',\''+field+'\','+step+')">+</button>' +
    '</div></div>';
}

// ═══════════════════════ PROGRESS ═══════════════════════
function renderProgress() {
  var body = document.getElementById('prog-body');
  var h = '<div class="sec-badge">Аналитика</div><div class="sec-title" style="margin-bottom:16px">Прогресс</div>';
  var totalWkts=0, totalSets=0;
  Object.keys(ST.w).forEach(function(ds){
    var day=ST.w[ds];
    if(day&&day.workouts) day.workouts.forEach(function(w){
      totalWkts++;
      (w.exercises||[]).forEach(function(ex){ ex.sets.forEach(function(s){if(s.done)totalSets++;}); });
    });
  });
  h += '<div class="stat-row">' +
    '<div class="stat-box"><div class="stat-num">'+totalWkts+'</div><div class="stat-lbl">Тренировок</div></div>' +
    '<div class="stat-box"><div class="stat-num">'+totalSets+'</div><div class="stat-lbl">Подходов</div></div>' +
    '</div>';
  var allEx = {};
  Object.keys(ST.w).forEach(function(ds){
    var day=ST.w[ds];
    if(day&&day.workouts) day.workouts.forEach(function(w){
      (w.exercises||[]).forEach(function(ex){
        if(!allEx[ex.name]) allEx[ex.name]=[];
        ex.sets.forEach(function(s){ if(s.done&&s.w) allEx[ex.name].push({date:ds,w:s.w,r:s.r||0}); });
      });
    });
  });
  var exNames = Object.keys(allEx).sort();
  if (!exNames.length) {
    h += '<div class="empty"><div class="empty-ico">📈</div><div class="empty-msg">Данные появятся после тренировок</div></div>';
  } else {
    h += '<select class="prog-sel" onchange="renderProgChart(this.value)">'+exNames.map(function(n){ return '<option>'+esc(n)+'</option>'; }).join('')+'</select>';
    h += '<div id="prog-chart"></div>';
  }
  body.innerHTML = h;
  if (exNames.length) { window._progAllEx = allEx; renderProgChart(exNames[0], allEx); }
}
function renderProgChart(name, allEx) {
  allEx = allEx||window._progAllEx||{};
  var el = document.getElementById('prog-chart'); if (!el) return;
  var data = (allEx[name]||[]).slice(-20); if (!data.length){ el.innerHTML=''; return; }
  var maxW = Math.max.apply(null,data.map(function(d){return d.w;}));
  var W=300,H=120,p=16;
  var xs=data.map(function(d,i){ return p+i*(W-2*p)/(Math.max(data.length-1,1)); });
  var ys=data.map(function(d){ return H-p-(d.w/maxW)*(H-2*p); });
  var pathD=xs.map(function(x,i){ return (i===0?'M':'L')+x+' '+ys[i]; }).join(' ');
  var fillD=pathD+' L'+xs[xs.length-1]+' '+H+' L'+xs[0]+' '+H+' Z';
  el.innerHTML='<div class="chart-box"><div class="chart-title">Максимальный вес — '+esc(name)+'</div>' +
    '<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'">' +
    '<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#22c55e" stop-opacity=".3"/><stop offset="1" stop-color="#22c55e" stop-opacity="0"/></linearGradient></defs>' +
    '<path d="'+fillD+'" fill="url(#g)"/>' +
    '<path d="'+pathD+'" fill="none" stroke="#22c55e" stroke-width="2" stroke-linejoin="round"/>' +
    xs.map(function(x,i){ return '<circle cx="'+x+'" cy="'+ys[i]+'" r="4" fill="#22c55e"/>'; }).join('') +
    '<text x="'+xs[xs.length-1]+'" y="'+(ys[ys.length-1]-8)+'" fill="#4ade80" font-size="12" font-weight="700" text-anchor="middle">'+data[data.length-1].w+' кг</text>' +
    '</svg></div>';
}

// ═══════════════════════ PROFILE ═══════════════════════

// ═══════════════════════ INIT ═══════════════════════
loadST();
renderTopbar();
renderWorkout();
if (ST.recovery && Date.now() < getRecoveryEnd()) startRecoveryTimer();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});
</script>
