<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GYM Log">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>GYM Log</title>
<style>
:root{
  --bg:#0a0a0a;
  --card:#141416;
  --card2:#0e0e10;
  --brd:rgba(255,255,255,0.055);
  --brd2:rgba(255,255,255,0.08);
  --acc:#22c55e;
  --acc-dim:rgba(34,197,94,0.12);
  --acc-brd:rgba(34,197,94,0.3);
  --acc-txt:#06210f;
  --red:#f43f5e;
  --blu:#38bdf8;
  --ylw:#f59e0b;
  --pur:#a78bfa;
  --txt:#fafafa;
  --sub:#a1a1aa;
  --mut:#71717a;
  --dim:#52525b;
  --r:15px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

/* вФАвФА LAYOUT вФАвФА */
.page{display:none;position:fixed;top:0;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  overscroll-behavior-y:none;
  padding-top:calc(env(safe-area-inset-top) + 60px);
  padding-bottom:max(170px,calc(env(safe-area-inset-bottom) + 150px))}
.page.on{display:block}
.inner{padding:12px 16px;max-width:560px;margin:0 auto}

/* вФАвФА TOPBAR вФАвФА */
.topbar{display:flex;align-items:center;
  padding-top:env(safe-area-inset-top);
  padding-left:16px;padding-right:16px;padding-bottom:0;
  border-bottom:1px solid var(--brd);background:rgba(10,10,10,0.97);
  -webkit-backdrop-filter:blur(24px) saturate(180%);backdrop-filter:blur(24px) saturate(180%);
  position:fixed;top:0;left:0;right:0;z-index:100;gap:10px;
  min-height:calc(env(safe-area-inset-top) + 52px);
  align-items:flex-end;padding-bottom:10px}
.topbar-logo{font-size:19px;font-weight:900;letter-spacing:2px;color:var(--acc)}
.topbar-logo span{color:var(--sub);font-weight:400;font-size:13px;letter-spacing:0}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:99px;
  font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--brd2);
  background:var(--card);color:var(--txt);transition:opacity .12s;-webkit-user-select:none;user-select:none}
.btn:active{opacity:.7}
.btn-acc{background:var(--acc-dim);border-color:var(--acc-brd);color:var(--acc)}
.btn-red{background:rgba(244,63,94,0.1);border-color:rgba(244,63,94,0.3);color:var(--red)}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:8px 14px;font-size:13.5px}
.wkt-timer{font-size:13px;color:var(--sub);font-variant-numeric:tabular-nums}

/* вФАвФА BOTTOM NAV вФАвФА */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;
  background:rgba(10,10,10,0.97);-webkit-backdrop-filter:blur(24px) saturate(180%);backdrop-filter:blur(24px) saturate(180%);
  border-top:1px solid var(--brd);
  padding:8px 0 12px}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 2px;
  cursor:pointer;border:none;background:none;color:var(--dim);font-size:10px;font-weight:500;
  font-family:inherit;transition:color .18s;-webkit-user-select:none;user-select:none;
  position:relative;min-height:44px;justify-content:center}
.nb.on{color:var(--acc);font-weight:700}
.nb.on::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:32px;height:2.5px;background:var(--acc);border-radius:0 0 3px 3px;
  box-shadow:0 0 8px rgba(34,197,94,0.6)}

/* вФАвФА SECTION BADGE вФАвФА */
.sec-badge{font-size:10.5px;font-weight:700;letter-spacing:1.5px;color:var(--acc);text-transform:uppercase;margin-bottom:4px}
.sec-title{font-size:24px;font-weight:700;letter-spacing:-0.4px;margin-bottom:2px}

/* вФАвФА WORKOUT HEAD вФАвФА */
.wkt-head{padding:8px 14px 10px;max-width:560px;margin:0 auto}
.wkt-name{font-size:21px;font-weight:700;letter-spacing:-0.4px;line-height:1.1}
.wkt-name-inp{font-size:21px;font-weight:700;letter-spacing:-0.4px;line-height:1.1;color:var(--txt);background:none;border:none;font-family:inherit;outline:none;-webkit-appearance:none;padding:0 0 2px;width:100%;min-width:0;border-bottom:1px dashed transparent;transition:border-color .15s}
.wkt-name-inp:focus{border-bottom-color:var(--brd2)}
.wkt-name-inp::placeholder{color:var(--dim)}
.wkt-timer-row{display:flex;align-items:center;gap:7px;margin-top:6px;font-size:12.5px;color:var(--sub);font-variant-numeric:tabular-nums}
.wkt-dot{width:6px;height:6px;border-radius:50%;background:var(--acc);box-shadow:0 0 8px var(--acc);flex-shrink:0}
.wkt-actions{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.wkt-stats{display:flex;gap:8px;margin-top:11px}
.stat-pill{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:8px 11px;flex:1}
.stat-pill-lbl{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
.stat-pill-val{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-0.3px;margin-top:1px}
.stat-pill-val.green{color:var(--acc)}

/* вФАвФА EXERCISE CARDS вФАвФА */
.ex-list{padding:4px 14px;max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:9px;
  padding-bottom:180px}
.ex-card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:11px 12px 8px}
.ex-card-hd{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.ex-tile{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:#fff;flex-shrink:0;text-transform:uppercase}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:14.5px;font-weight:650;letter-spacing:-0.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-sub{font-size:11.5px;color:var(--mut);margin-top:1px}
.ex-vol{font-size:11px;font-weight:700;color:var(--acc);background:rgba(34,197,94,0.1);
  padding:4px 8px;border-radius:7px;white-space:nowrap;font-variant-numeric:tabular-nums}
.ex-body{display:none}
.ex-body.open{display:block}
.sets-hdr{display:grid;grid-template-columns:26px 1.15fr 0.95fr 44px;align-items:center;
  padding:0 2px 5px;font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:0.4px;font-weight:600}
.set-row{display:grid;grid-template-columns:26px 1.15fr 0.95fr 44px;align-items:center;
  padding:3px 2px;gap:4px;border-radius:10px;transition:background .15s}
.set-row.done{background:rgba(34,197,94,0.05)}
.set-n{font-size:11px;color:var(--dim);font-weight:600;text-align:center}
.set-cell{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.05);border-radius:10px;
  min-height:48px;padding:6px 8px;text-align:center;font-size:17px;font-weight:700;cursor:pointer;
  transition:all .15s;position:relative;display:flex;align-items:center;justify-content:center;gap:2px;
  -webkit-user-select:none;user-select:none}
.set-cell:active{opacity:.7}
.set-cell.done{background:rgba(34,197,94,0.12);border-color:rgba(34,197,94,0.3);color:var(--acc)}
.set-cell-unit{font-size:10px;color:var(--dim);font-weight:500}
.set-circle{width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.15);
  background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);color:transparent;font-size:15px;margin:0 auto;
  -webkit-user-select:none;user-select:none}
.set-circle.done{background:var(--acc);border-color:var(--acc);color:var(--acc-txt);
  box-shadow:0 2px 12px rgba(34,197,94,0.4)}
.add-row{display:flex;gap:7px;margin-top:10px}
.add-btn{flex:1;min-height:44px;padding:0 8px;background:var(--card2);border:1px solid rgba(255,255,255,0.06);
  border-radius:10px;color:var(--sub);font-size:13.5px;font-weight:600;font-family:inherit;cursor:pointer;
  transition:opacity .12s}
.add-btn:active{opacity:.6}
.del-btn{min-height:44px;padding:0 14px;background:none;border:1px solid rgba(255,255,255,0.06);
  border-radius:10px;color:var(--red);font-size:13.5px;font-weight:600;font-family:inherit;cursor:pointer;
  transition:opacity .12s}
.del-btn:active{opacity:.6}
.set-rec-btn{width:100%;height:56px;background:var(--acc);color:var(--acc-txt);font-size:16px;font-weight:700;
  border:none;border-radius:16px;cursor:pointer;margin-top:10px;letter-spacing:-0.2px;
  font-family:inherit;display:flex;align-items:center;justify-content:center;gap:9px;
  box-shadow:0 4px 20px rgba(34,197,94,0.3);transition:transform .12s,opacity .12s;
  -webkit-user-select:none;user-select:none}
.set-rec-btn:active{transform:scale(0.97);opacity:.9}
.set-rec-btn.pool{background:var(--blu);color:#04222e;box-shadow:0 4px 20px rgba(56,189,248,0.3)}
.add-ex-btn{display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;height:48px;border-radius:14px;background:transparent;
  border:1.5px dashed rgba(34,197,94,0.4);color:var(--acc);
  font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .12s}
.add-ex-btn:active{opacity:.6}
.rm-ex-btn{width:100%;min-height:44px;padding:0 8px;background:none;border:1px solid rgba(255,255,255,0.06);
  border-radius:10px;color:var(--red);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:8px;
  transition:opacity .12s}
.rm-ex-btn:active{opacity:.6}
.ex-hist{display:flex;gap:14px;padding:0 2px 8px;font-size:12px;color:var(--sub)}
.ex-hist-val{color:var(--txt);font-weight:700}
.ex-hist-pr{color:var(--ylw);font-weight:700}
.wkt-tpl-card{display:flex;align-items:center;gap:12px;background:var(--card);
  border:1px solid var(--brd);border-radius:14px;padding:12px 14px;margin-bottom:8px;cursor:pointer}
.wkt-tpl-card:active{opacity:.8}

/* вФАвФА REST TIMER вФАвФА */
.rest-bar{position:fixed;left:14px;right:14px;z-index:90;display:none;
  bottom:72px}
.rest-bar.vis{display:flex}
.rest-inner{background:rgba(20,21,23,0.92);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
  border:1px solid rgba(34,197,94,0.35);border-radius:16px;padding:10px 12px;
  display:flex;align-items:center;gap:12px;width:100%;max-width:560px;margin:0 auto;
  box-shadow:0 14px 34px rgba(0,0,0,0.55),0 0 28px rgba(34,197,94,0.15)}
.rest-ring{position:relative;width:38px;height:38px;flex-shrink:0}
.rest-time{font-size:22px;font-weight:900;color:var(--acc);font-variant-numeric:tabular-nums;min-width:50px}
.rest-lbl{font-size:12px;color:var(--sub);flex:1;line-height:1.3}
.rest-ctrl{display:flex;gap:6px}
.rest-ctrl button{background:var(--card);border:1px solid var(--brd2);color:var(--txt);
  font-size:12px;font-weight:700;padding:6px 10px;border-radius:8px;cursor:pointer;font-family:inherit}

/* вФАвФА BOTTOM SHEET вФАвФА */
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
.sh-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;display:none;
  align-items:flex-end;justify-content:center}
.sh-overlay.vis{display:flex;animation:overlayIn .2s ease}
.sh-overlay.vis .sheet{animation:sheetUp .32s cubic-bezier(.32,.72,0,1)}
.sheet{background:#1c1c1e;border-radius:22px 22px 0 0;width:100%;max-width:560px;
  padding-bottom:max(28px,calc(env(safe-area-inset-bottom) + 12px))}
.sh-handle{width:40px;height:4px;background:rgba(255,255,255,0.18);border-radius:2px;margin:14px auto 0}
.sh-title{font-size:13px;font-weight:600;padding:12px 20px 2px;color:var(--sub);text-align:center;
  text-transform:uppercase;letter-spacing:.5px}
.sh-mode{display:flex;gap:5px;margin:8px 16px 0;background:var(--card2);border:1px solid var(--brd2);border-radius:11px;padding:3px}
.sh-mode button{flex:1;padding:8px 4px;font-size:12.5px;font-weight:700;font-family:inherit;border:none;background:none;color:var(--sub);border-radius:8px;cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none}
.sh-mode button.on{background:rgba(34,197,94,0.18);color:var(--acc)}
.sh-manual-wrap{display:none;align-items:baseline;justify-content:center;gap:8px;padding:26px 20px 14px}
.sh-manual-input{width:160px;text-align:center;font-size:40px;font-weight:800;color:var(--txt);background:var(--card2);border:2px solid var(--acc-brd);border-radius:16px;padding:12px 8px;font-family:inherit;-webkit-appearance:none;-moz-appearance:textfield;outline:none;font-variant-numeric:tabular-nums;letter-spacing:-1px}
.sh-manual-input:focus{border-color:var(--acc)}
.sh-manual-input::-webkit-outer-spin-button,.sh-manual-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.sh-manual-unit{font-size:18px;color:var(--mut);font-weight:600}
.sh-val-display{text-align:center;font-size:36px;font-weight:800;color:var(--txt);
  margin:6px 0 2px;font-variant-numeric:tabular-nums;letter-spacing:-1px}
.sh-val-unit{font-size:16px;color:var(--mut);font-weight:500}
.presets{display:flex;gap:8px;padding:8px 20px 6px;justify-content:center}
.preset{background:rgba(255,255,255,0.07);border:none;color:var(--txt);
  font-size:15px;font-weight:700;padding:10px 0;border-radius:12px;cursor:pointer;flex:1;
  font-family:inherit;min-height:44px;transition:opacity .12s}
.preset:active{opacity:.6}
.drum-wrap{position:relative;height:216px;margin:0 20px;overflow:hidden}
.drum-mask{position:absolute;inset:0;pointer-events:none;z-index:2;
  background:linear-gradient(to bottom,#1c1c1e 0,transparent 30%,transparent 70%,#1c1c1e 100%)}
.drum-center{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:48px;
  border-top:1.5px solid rgba(34,197,94,0.5);border-bottom:1.5px solid rgba(34,197,94,0.5);
  background:rgba(34,197,94,0.07);border-radius:10px;pointer-events:none;z-index:1}
.drum{height:216px;overflow-y:scroll;scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;padding:84px 0;position:relative;z-index:1}
.drum::-webkit-scrollbar{display:none}
.drum-item{height:48px;display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:700;scroll-snap-align:center;color:var(--dim);
  transition:color .08s,font-size .08s;font-variant-numeric:tabular-nums}
.sh-done{width:calc(100% - 32px);margin:10px 16px 0;padding:17px;background:var(--acc);
  color:var(--acc-txt);font-size:17px;font-weight:800;border:none;border-radius:14px;
  cursor:pointer;font-family:inherit;transition:opacity .12s;-webkit-user-select:none;user-select:none}
.sh-done:active{opacity:.85}

/* вФАвФА CALENDAR вФАвФА */
.cal-nav{display:flex;align-items:center;padding:8px 14px;max-width:560px;margin:0 auto;gap:8px}
.cal-month{font-size:22px;font-weight:700;letter-spacing:-0.4px;flex:1}
.cal-stat{font-size:12.5px;color:var(--sub);padding:0 14px 8px;max-width:560px;margin:0 auto;font-variant-numeric:tabular-nums}
.cal-legend{display:flex;flex-wrap:wrap;gap:6px 12px;padding:0 14px 14px;max-width:560px;margin:0 auto}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sub)}
.cal-legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cal-arrow{background:rgba(255,255,255,0.06);border:1px solid var(--brd);color:var(--txt);
  font-size:16px;width:40px;height:40px;border-radius:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0;
  transition:opacity .12s;-webkit-user-select:none;user-select:none}
.cal-arrow:active{opacity:.5}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 14px 12px;
  max-width:560px;margin:0 auto}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--dim);padding:4px 0;text-transform:uppercase}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;color:var(--dim);gap:3px;transition:background .1s}
.cal-cell.cur{color:var(--sub)}
.cal-cell.today{background:rgba(255,255,255,0.06);color:var(--txt)}
.cal-cell.sel{background:var(--acc)!important;color:var(--acc-txt)!important}
.cal-cell.has-w{color:var(--txt)}
.cal-dot{width:6px;height:6px;border-radius:50%}
.cal-dot.gym{background:var(--acc)}
.cal-dot.pool{background:var(--blu)}
.cal-dot.rest{background:var(--sub)}
.cal-detail{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);
  margin:0 14px 14px;padding:14px;max-width:560px;margin-left:auto;margin-right:auto}
.cal-det-title{font-size:16px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.cal-ex-row{padding:7px 0;border-bottom:1px solid var(--brd);font-size:14px;display:flex;align-items:center;gap:8px}
.cal-ex-row:last-child{border:none}
.cal-ex-name{flex:1;font-weight:600}
.cal-ex-meta{font-size:12px;color:var(--sub)}

/* вФАвФА TEMPLATES вФАвФА */
.tpl-card{background:var(--card);border:1px solid var(--brd);border-radius:16px;margin-bottom:9px;
  padding:13px 14px;cursor:pointer;display:flex;align-items:center;gap:13px;
  transition:background .12s;-webkit-user-select:none;user-select:none}
.tpl-card:active{background:#1a1a1c}
.tpl-tile{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;
  font-size:19px;font-weight:800;color:#fff;flex-shrink:0}
.tpl-name{font-size:15.5px;font-weight:700;letter-spacing:-0.2px}
.tpl-meta{font-size:11.5px;color:var(--mut);margin-top:2px}
.tpl-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:100px;margin-top:5px;display:inline-block}
.tpl-badge.gym{background:rgba(34,197,94,0.12);color:var(--acc)}
.tpl-badge.pool{background:rgba(56,189,248,0.12);color:var(--blu)}

/* вФАвФА TEMPLATE EDITOR вФАвФА */
.tpl-editor{background:rgba(0,0,0,0.85);position:fixed;inset:0;z-index:150;
  display:none;flex-direction:column;overflow-y:auto;
  padding-top:calc(max(14px,env(safe-area-inset-top) + 8px));
  padding-bottom:max(40px,calc(env(safe-area-inset-bottom) + 24px))}
.tpl-editor.vis{display:flex}
.tpl-editor-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;flex-shrink:0}
.back-btn{display:flex;align-items:center;gap:5px;color:var(--sub);font-size:14px;cursor:pointer;background:none;border:none;font-family:inherit}
.editor-name-inp{width:100%;background:transparent;border:none;outline:none;color:var(--txt);
  font-size:24px;font-weight:700;letter-spacing:-0.5px;font-family:inherit;padding:4px 16px 2px;
  -webkit-appearance:none}
.editor-sub{font-size:12.5px;color:var(--mut);padding:0 16px 12px}
.editor-ex-card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:11px 12px;margin:0 14px 9px}
.editor-ex-hd{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.editor-steppers{display:flex;gap:7px}
.stepper-box{flex:1;background:var(--card2);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:7px 5px}
.stepper-lbl{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:0.4px;font-weight:600;text-align:center;margin-bottom:5px}
.stepper-row{display:flex;align-items:center;justify-content:center;gap:6px}
.stepper-btn{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,0.08);border:none;
  color:var(--txt);font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-family:inherit;flex-shrink:0;transition:opacity .12s;-webkit-user-select:none;user-select:none}
.stepper-btn:active{opacity:.5}
.stepper-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;min-width:32px;text-align:center}
.editor-add-btn{display:flex;align-items:center;justify-content:center;gap:7px;margin:4px 14px;
  height:44px;border-radius:14px;background:transparent;border:1.5px dashed rgba(34,197,94,0.4);
  color:var(--acc);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:calc(100% - 28px)}
.rm-tile-btn{width:28px;height:28px;border-radius:8px;background:#1a1a1c;display:flex;align-items:center;
  justify-content:center;cursor:pointer;flex-shrink:0;border:none}
.loc-tog{display:flex;background:var(--card2);border-radius:8px;border:1px solid var(--brd2);overflow:hidden;margin:0 14px 16px}
.loc-tog-btn{flex:1;padding:8px 12px;font-size:13px;font-weight:700;font-family:inherit;border:none;
  background:none;color:var(--sub);cursor:pointer;transition:all .15s}
.loc-tog-btn.on-gym{background:rgba(34,197,94,0.2);color:var(--acc)}
.loc-tog-btn.on-pool{background:rgba(56,189,248,0.15);color:var(--blu)}

/* вФАвФА EXERCISE DB MODAL вФАвФА */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:300;display:none;
  align-items:flex-end;justify-content:center}
.modal-ov.vis{display:flex;animation:overlayIn .2s ease}
.modal-ov.vis .modal{animation:sheetUp .32s cubic-bezier(.32,.72,0,1)}
.modal{background:#1c1c1e;border-radius:22px 22px 0 0;width:100%;max-width:560px;
  max-height:90vh;display:flex;flex-direction:column;
  padding-bottom:max(24px,calc(env(safe-area-inset-bottom) + 8px))}
.modal-hd{display:flex;align-items:center;padding:18px 20px 14px;border-bottom:1px solid var(--brd);gap:12px;flex-shrink:0}
.modal-title{font-size:17px;font-weight:800;flex:1}
.modal-x{background:rgba(255,255,255,0.1);color:var(--sub);font-size:15px;
  width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;
  justify-content:center;border:none;font-weight:700;transition:opacity .12s}
.modal-x:active{opacity:.6}
.modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 20px;overscroll-behavior:contain}
.db-search{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:12px;
  padding:12px 16px;color:var(--txt);font-size:16px;font-family:inherit;width:100%;margin-bottom:12px;outline:none;
  -webkit-appearance:none}
.db-search:focus{border-color:var(--acc);background:rgba(255,255,255,0.09)}
.db-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.db-chip{padding:7px 13px;border-radius:100px;font-size:12.5px;font-weight:600;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:var(--sub);
  cursor:pointer;min-height:34px;transition:opacity .12s;-webkit-user-select:none;user-select:none}
.db-chip:active{opacity:.6}
.db-chip.on{background:rgba(34,197,94,0.15);border-color:var(--acc);color:var(--acc)}
.db-sec-hd{font-size:11px;font-weight:700;color:var(--mut);letter-spacing:.6px;text-transform:uppercase;padding:12px 0 7px}
.db-item{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);border-radius:12px;
  padding:13px 14px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:10px;
  min-height:52px;transition:background .12s;-webkit-user-select:none;user-select:none}
.db-item:active{background:rgba(255,255,255,0.1)}
.db-item-name{font-size:14.5px;font-weight:600;flex:1}
.db-item-grp{font-size:11px;color:var(--sub)}

/* вФАвФА PROGRESS вФАвФА */
.prog-sel{background:var(--card2);border:1px solid var(--brd2);border-radius:10px;padding:12px 14px;
  color:var(--txt);font-size:16px;font-family:inherit;width:100%;margin-bottom:14px;-webkit-appearance:none}
.chart-box{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:14px;margin-bottom:12px}
.chart-title{font-size:13px;font-weight:700;color:var(--sub);margin-bottom:10px}
.chart-svg{width:100%;height:120px;overflow:visible}
.stat-row{display:flex;gap:10px;margin-bottom:14px}
.stat-box{flex:1;background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:14px;text-align:center}
.stat-num{font-size:24px;font-weight:900;color:var(--acc)}
.stat-lbl{font-size:11px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:4px}

/* вФАвФА RECOMMENDATIONS вФАвФА */
.rec-block{background:var(--card);border:1px solid var(--acc-brd);border-radius:var(--r);padding:14px 14px 10px;margin-bottom:14px}
.rec-hd{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.rec-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.rec-chip{font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px}
.rec-rested{background:rgba(34,197,94,0.12);color:var(--acc)}
.rec-tired{background:rgba(244,63,94,0.09);color:var(--red);opacity:.8}
.rec-row{display:flex;flex-direction:column;gap:6px}
.rec-btn{display:flex;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--brd2);border-radius:12px;padding:10px 12px;cursor:pointer;font-family:inherit;text-align:left;width:100%;-webkit-user-select:none;user-select:none;transition:opacity .12s}
.rec-btn:active{opacity:.7}

/* вФАвФА PLAN CARD вФАвФА */
.plan-card{background:var(--card);border-radius:var(--r);margin-bottom:10px;overflow:hidden;border:1px solid rgba(167,139,250,0.22);display:flex;flex-direction:column}
.plan-card-accent{width:100%;height:3px;background:linear-gradient(90deg,var(--pur),rgba(139,92,246,0.4))}
.plan-card-body{padding:13px 14px 11px;flex:1}
.plan-card-toprow{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.plan-card-badge{font-size:9px;font-weight:800;color:var(--pur);text-transform:uppercase;letter-spacing:1px;opacity:.7;display:flex;align-items:center;gap:4px}
.plan-card-icons{display:flex;gap:2px}
.plan-ico-btn{background:none;border:none;color:var(--dim);cursor:pointer;padding:5px;border-radius:8px;display:flex;align-items:center;justify-content:center;-webkit-user-select:none;user-select:none;transition:opacity .12s}
.plan-ico-btn:active{opacity:.5}
.plan-card-name{font-size:17px;font-weight:800;color:var(--txt);letter-spacing:-.3px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plan-card-meta{font-size:12px;color:var(--dim);margin-bottom:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plan-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:2px}
.plan-chip{font-size:11px;font-weight:600;padding:3px 9px;background:rgba(167,139,250,0.1);color:var(--pur);border-radius:100px;border:1px solid rgba(167,139,250,0.18)}
.plan-btn-start{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:rgba(167,139,250,0.1);border:none;border-top:1px solid rgba(167,139,250,0.15);color:var(--pur);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-user-select:none;user-select:none;transition:opacity .12s}
.plan-btn-start:active{opacity:.6}

/* вФАвФА PLAN EDITOR вФАвФА */
.plan-ed-hd{display:flex;align-items:center;gap:6px;padding:10px 12px;background:var(--bg);border-bottom:1px solid var(--brd2);position:sticky;top:0;z-index:10}
.plan-ed-back{background:none;border:none;color:var(--sub);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;display:flex;align-items:center;gap:5px;padding:4px 6px 4px 2px;flex-shrink:0;-webkit-user-select:none;user-select:none}
.plan-name-inp{background:none;border:none;color:var(--txt);font-size:16px;font-weight:800;font-family:inherit;flex:1;outline:none;-webkit-appearance:none;letter-spacing:-.3px;padding:0;min-width:0}
.plan-name-inp::placeholder{color:var(--dim)}
.plan-ed-del{background:none;border:none;color:var(--dim);cursor:pointer;padding:6px;flex-shrink:0;-webkit-user-select:none;user-select:none;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:opacity .12s}
.plan-ed-del:active{opacity:.5}
.plan-loc-row{display:flex;gap:6px;padding:10px 14px 2px}
.plan-loc-btn{flex:1;padding:9px;font-size:12px;font-weight:700;font-family:inherit;border:1.5px solid var(--brd2);background:none;color:var(--sub);border-radius:10px;cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none}
.plan-loc-btn.on-gym{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.1);color:var(--acc)}
.plan-loc-btn.on-pool{border-color:rgba(56,189,248,.4);background:rgba(56,189,248,.1);color:var(--blu)}

/* Plan exercise rows (collapsible) */
.plan-ex-wrap{margin:8px 14px 0}
.plan-ex-row{background:var(--card);border:1px solid var(--brd);border-radius:12px;margin-bottom:7px;overflow:hidden}
.plan-ex-hd{display:flex;align-items:center;gap:10px;padding:11px 12px;cursor:pointer;-webkit-user-select:none;user-select:none;transition:opacity .1s}
.plan-ex-hd:active{opacity:.7}
.plan-ex-tile{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff;flex-shrink:0}
.plan-ex-info{flex:1;min-width:0}
.plan-ex-name{font-size:14px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plan-ex-summary{font-size:11px;color:var(--mut);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plan-ex-chev{color:var(--dim);flex-shrink:0;transition:transform .2s}
.plan-ex-chev.open{transform:rotate(90deg)}
.plan-ex-body{display:none;border-top:1px solid var(--brd2);padding:8px 12px 10px}
.plan-ex-body.open{display:block}

/* Save button */
.plan-save-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:16px 14px 8px;height:50px;border-radius:14px;font-size:15px;font-weight:700;border:none;background:rgba(167,139,250,0.15);color:var(--pur);cursor:pointer;font-family:inherit;-webkit-user-select:none;user-select:none;transition:opacity .12s;border:1.5px solid rgba(167,139,250,0.3)}
.plan-save-btn:active{opacity:.7}
.btn-plan{border-color:rgba(167,139,250,0.3);color:var(--pur)}

/* вФАвФА RECOVERY CARD вФАвФА */
.rcv-card{background:var(--card);border:1px solid rgba(56,189,248,0.28);border-radius:var(--r);padding:16px;margin-bottom:14px}
.rcv-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.rcv-badge{font-size:10.5px;font-weight:700;color:var(--blu);text-transform:uppercase;letter-spacing:.7px;display:flex;align-items:center;gap:5px;flex:1}
.rcv-close{background:rgba(255,255,255,0.07);border:none;color:var(--mut);font-size:13px;cursor:pointer;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.rcv-time{font-size:26px;font-weight:900;color:var(--blu);font-variant-numeric:tabular-nums;letter-spacing:-1px;margin-bottom:4px;line-height:1}
.rcv-time-sub{font-size:11.5px;color:var(--sub);margin-bottom:10px}
.rcv-bar-wrap{height:5px;background:rgba(255,255,255,0.07);border-radius:100px;overflow:hidden;margin-bottom:14px}
.rcv-bar-fill{height:100%;background:linear-gradient(90deg,var(--blu),#818cf8);border-radius:100px}
.rcv-groups{display:flex;flex-direction:column;gap:8px}
.rcv-grp{display:grid;grid-template-columns:70px 1fr 56px;align-items:center;gap:8px}
.rcv-grp-lbl{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rcv-grp-bar{height:4px;background:rgba(255,255,255,0.07);border-radius:100px;overflow:hidden}
.rcv-grp-fill{height:100%;border-radius:100px}
.rcv-grp-rem{font-size:11px;color:var(--sub);text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.rcv-done{background:rgba(34,197,94,0.08);border:1px solid var(--acc-brd);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:14px}
.btn-rcv{border-color:rgba(56,189,248,0.32);color:var(--blu)}

/* вФАвФА MISC вФАвФА */
.empty{text-align:center;padding:48px 20px;color:var(--sub)}
.empty-ico{font-size:52px;margin-bottom:12px}
.empty-msg{font-size:16px;margin-bottom:20px}
.wkt-idle-card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);
  margin-bottom:8px;padding:13px 14px;display:flex;align-items:center;gap:12px}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">GYM<span> Log</span></div>
  <div id="topbar-right" class="topbar-right"></div>
</div>

<!-- PAGES -->
<div id="pg-workout" class="page on"></div>

<div id="pg-calendar" class="page">
  <div style="max-width:560px;margin:0 auto;padding-top:8px">
    <div style="padding:0 14px 4px"><div class="sec-badge">–Ц—Г—А–љ–∞–ї</div></div>
  </div>
  <div class="cal-nav">
    <div class="cal-month" id="cal-month-lbl"></div>
    <button class="cal-arrow" onclick="calShift(-1)">
      <svg width="9" height="15" viewBox="0 0 12 20" fill="none"><path d="M10 2L2 10l8 8" stroke="#a1a1aa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="cal-arrow" onclick="calShift(1)">
      <svg width="9" height="15" viewBox="0 0 12 20" fill="none"><path d="M2 2l8 8-8 8" stroke="#a1a1aa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <div class="cal-stat" id="cal-stat"></div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="cal-legend" id="cal-legend"></div>
  <div id="cal-detail"></div>
</div>

<div id="pg-templates" class="page">
  <div class="inner" id="tpl-body"></div>
</div>

<div id="pg-progress" class="page">
  <div class="inner" id="prog-body"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <button class="nb on" onclick="goTab('workout')" id="nb-workout">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="9" width="3" height="6" rx="1"/><rect x="4.5" y="7" width="3" height="10" rx="1"/><line x1="7.5" y1="12" x2="16.5" y2="12"/><rect x="16.5" y="7" width="3" height="10" rx="1"/><rect x="19.5" y="9" width="3" height="6" rx="1"/></svg>
    –Ґ—А–µ–љ–Є—А–Њ–≤–Ї–∞
  </button>
  <button class="nb" onclick="goTab('calendar')" id="nb-calendar">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="17" rx="2.5"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2.5" x2="8" y2="6.5"/><line x1="16" y1="2.5" x2="16" y2="6.5"/></svg>
    –Ъ–∞–ї–µ–љ–і–∞—А—М
  </button>
  <button class="nb" onclick="goTab('templates')" id="nb-templates">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2.5"/><rect x="9" y="2.5" width="6" height="3.5" rx="1.2"/><line x1="8.5" y1="10.5" x2="15.5" y2="10.5"/><line x1="8.5" y1="14.5" x2="13.5" y2="14.5"/></svg>
    –®–∞–±–ї–Њ–љ—Л
  </button>
  <button class="nb" onclick="goTab('progress')" id="nb-progress">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="20" x2="20" y2="20"/><rect x="5.5" y="12" width="3" height="6" rx="0.6"/><rect x="10.5" y="8" width="3" height="10" rx="0.6"/><rect x="15.5" y="4" width="3" height="14" rx="0.6"/></svg>
    –Я—А–Њ–≥—А–µ—Б—Б
  </button>
</nav>

<!-- REST TIMER -->
<div class="rest-bar" id="rest-bar">
  <div class="rest-inner">
    <div class="rest-ring">
      <svg width="38" height="38" viewBox="0 0 42 42" style="transform:rotate(-90deg)">
        <circle cx="21" cy="21" r="18" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
        <circle id="rest-ring-arc" cx="21" cy="21" r="18" fill="none" stroke="#22c55e" stroke-width="4"
          stroke-linecap="round" stroke-dasharray="113" stroke-dashoffset="0"/>
      </svg>
    </div>
    <div class="rest-time" id="rest-time">1:30</div>
    <div class="rest-lbl">–Ю—В–і—Л—Е –Љ–µ–ґ–і—Г –њ–Њ–і—Е–Њ–і–∞–Љ–Є</div>
    <div class="rest-ctrl">
      <button onclick="restAdd(15)">+15—Б</button>
      <button onclick="restToggle()" id="rest-tog">вПЄ</button>
      <button onclick="restStop()">вЬХ</button>

<!-- BOTTOM SHEET (drum picker) -->
<div class="sh-overlay" id="sh-overlay" onclick="shClose(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sh-handle"></div>
    <div class="sh-title" id="sh-title">–Т–µ—Б (–Ї–≥)</div>
    <div class="sh-mode" id="sh-mode">
      <button id="sh-mode-drum" onclick="setInputMode('drum')">рЯО∞ –С–∞—А–∞–±–∞–љ</button>
      <button id="sh-mode-manual" onclick="setInputMode('manual')">вМ®пЄП –Т–≤–Њ–і</button>
    </div>
    <div class="sh-val-display" id="sh-val-display">0 <span class="sh-val-unit" id="sh-val-unit">–Ї–≥</span></div>

      <div class="drum-mask"></div>
      <div class="drum-center"></div>

<!-- EXERCISE DB MODAL -->
<div class="modal-ov" id="db-modal" onclick="dbClose(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hd">
      <div class="modal-title">–С–∞–Ј–∞ —Г–њ—А–∞–ґ–љ–µ–љ–Є–є</div>
      <button class="modal-x" onclick="dbClose()">вЬХ</button>
    </div>
    <div class="modal-body">
      <input class="db-search" id="db-search" placeholder="–Я–Њ–Є—Б–Ї..." oninput="dbRender()" autocomplete="off">
      <div class="db-chips" id="db-chips"></div>
      <div id="db-list"></div>
    </div>
  </div>
</div>

<!-- TEMPLATE EDITOR -->
<div class="tpl-editor" id="tpl-editor">
  <div class="tpl-editor-hd">
    <button class="back-btn" onclick="editorClose()">
      <svg width="9" height="15" viewBox="0 0 12 20" fill="none"><path d="M10 2L2 10l8 8" stroke="#a1a1aa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      –®–∞–±–ї–Њ–љ—Л
    </button>

  if (!day) return [];
  if (day.type === 'rest' && (!day.workouts || !day.workouts.length)) return ['#71717a'];

  var seen = {};
  (day.workouts || []).forEach(function(w) {
    if (w.loc === 'pool') {
      if (!seen['–°—В–Є–ї–Є']) { seen['–°—В–Є–ї–Є'] = true; colors.push('#06b6d4'); }
    }
    (w.exercises || []).forEach(function(ex) {
      var grp = exGroup(ex.name);
      if (grp && !seen[grp]) {
        seen[grp] = true;
        colors.push(muscleGroupColor(grp));
      }
    });
  });
  if (!colors.length && day.type === 'rest') return ['#71717a'];
  return colors.slice(0, 3);
}

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР STATE вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
var CUR_TAB = 'workout';
var CUR_DATE = todayStr();
var ACTIVE_WKT = null;
var PLAN_WKT   = null; // {date, wid} вАФ –њ–ї–∞–љ, –Њ—В–Ї—А—Л—В—Л–є –і–ї—П —А–µ–і–∞–Ї—В–Є—А–Њ–≤–∞–љ–Є—П
var WKT_START = null;
var WKT_TIMER_ID = null;
var CAL_YEAR, CAL_MONTH;
var SEL_DATE = null;
var OPEN_EX = {};
var REST_SEC = 0, REST_TOTAL = 90, REST_RUNNING = false, REST_ID = null;
var SH_MODE = null, SH_VAL = 0, SH_RANGE = [], SH_STEP = 1, SH_FMT = null;
var DB_FILTER = null, DB_CB = null, DB_POOL = false;

// Editor state
var EDITOR_TPL = null; // {name, loc, exs:[{name,sets,reps,weight}]}
var EDITOR_IDX = -1;   // index in ST.templates, -1 = new

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function pad(n) { return n < 10 ? '0'+n : ''+n; }
function dateLabel(ds) {
  var p = ds.split('-'), d = new Date(+p[0], +p[1]-1, +p[2]);
  var m = ['—П–љ–≤–∞—А—П','—Д–µ–≤—А–∞–ї—П','–Љ–∞—А—В–∞','–∞–њ—А–µ–ї—П','–Љ–∞—П','–Є—О–љ—П','–Є—О–ї—П','–∞–≤–≥—Г—Б—В–∞','—Б–µ–љ—В—П–±—А—П','–Њ–Ї—В—П–±—А—П','–љ–Њ—П–±—А—П','–і–µ–Ї–∞–±—А—П'];
  return d.getDate() + ' ' + m[d.getMonth()];
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function nf(v) { return (Math.round(v*10)/10).toString().replace('.',','); }
function letterOf(name) { return (name||'?')[0].toUpperCase(); }

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР TAB ROUTING вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
function goTab(tab) {
  CUR_TAB = tab;
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('on'); });
  document.querySelectorAll('.nb').forEach(function(b){ b.classList.remove('on'); });
  document.getElementById('pg-'+tab).classList.add('on');
  document.getElementById('nb-'+tab).classList.add('on');
  renderTopbar();
  if (tab === 'workout') renderWorkout();
  if (tab === 'calendar') renderCal();
  if (tab === 'templates') renderTemplates();
  if (tab === 'progress') renderProgress();
}

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР TOPBAR вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
function renderTopbar() {
  var r = document.getElementById('topbar-right');
  if (CUR_TAB === 'workout') {
    if (ACTIVE_WKT) {
      r.innerHTML = '<span class="wkt-timer" id="wkt-elapsed">0:00</span>' +
        '<button class="btn btn-red btn-sm" onclick="finishWorkout()">–Ч–∞–≤–µ—А—И–Є—В—М</button>';
    } else if (PLAN_WKT) {
      r.innerHTML = '';
    } else {
      r.innerHTML = '<button class="btn btn-acc btn-sm" onclick="startWorkout()">+ –Ґ—А–µ–љ–Є—А–Њ–≤–Ї–∞</button>';
    }
  } else if (CUR_TAB === 'templates') {
    r.innerHTML = '<button class="btn btn-sm" onclick="newCustomTpl()">+ –®–∞–±–ї–Њ–љ</button>';
  } else { r.innerHTML = ''; }
}

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР WORKOUT вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
function getWorkouts(date) {
  return (ST.w[date] && ST.w[date].workouts) ? ST.w[date].workouts : [];
}
function getWkt(date, wid) {
  var ws = getWorkouts(date);
  for (var i = 0; i < ws.length; i++) if (ws[i].id === wid) return ws[i];
  return null;
}
function ensureDay(date) {
  if (!ST.w[date]) ST.w[date] = {type:'day', workouts:[]};
  if (!ST.w[date].workouts) ST.w[date].workouts = [];
}

function getExStats(name) {
  var today = todayStr();
  var pr = 0, lastW = 0, lastR = 0, lastDate = null;
  Object.keys(ST.w).sort().forEach(function(ds) {
    if (ds === today) return;
    var day = ST.w[ds];
    if (!day || !day.workouts) return;
    day.workouts.forEach(function(wkt) {
      (wkt.exercises || []).forEach(function(ex) {
        if (ex.name !== name) return;
        var done = (ex.sets || []).filter(function(s){ return s.done && (s.w||0) > 0; });
        if (!done.length) return;
        var mx = Math.max.apply(null, done.map(function(s){ return s.w||0; }));
        if (mx > pr) pr = mx;
        if (!lastDate || ds > lastDate) {
          lastDate = ds;
          var last = done[done.length-1];
          lastW = last.w||0; lastR = last.r||0;
        }
      });
    });
  });
  return lastDate ? {lastW:lastW, lastR:lastR, pr:pr} : null;
}
// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР RECOVERY вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
var RCV_TIMER_ID = null;
var BASE_RCV_H = {'–Э–Њ–≥–Є':72,'–°–њ–Є–љ–∞':64,'–У—А—Г–і—М':56,'–Я–ї–µ—З–Є':44,'–†—Г–Ї–Є':36,'–°—В–∞—В–Є–Ї–∞':28,'–Ъ–∞—А–і–Є–Њ':22,'–°—В–Є–ї–Є':18};

// –Ю—Ж–µ–љ–Ї–∞ 1–Я–Ь –њ–Њ —Д–Њ—А–Љ—Г–ї–µ –≠–њ–ї–Є
function e1RM(w, r) { return (w > 0 && r > 0) ? w * (1 + r / 30) : 0; }

// –Ы—Г—З—И–Є–є —А–∞—Б—З—С—В–љ—Л–є 1–Я–Ь —Г–њ—А–∞–ґ–љ–µ–љ–Є—П –Ј–∞ –≤—Б—О –Є—Б—В–Њ—А–Є—О (–≤–Ї–ї—О—З–∞—П —Б–µ–≥–Њ–і–љ—П) вАФ –Љ–µ—А–∞ —Б–Є–ї—Л
function bestE1RM(name) {
  var best = 0;
  Object.keys(ST.w).forEach(function(ds) {
    var day = ST.w[ds];
    if (!day || !day.workouts) return;
    day.workouts.forEach(function(wkt) {
      (wkt.exercises || []).forEach(function(ex) {
        if (ex.name !== name) return;
        (ex.sets || []).forEach(function(s) {
          if (!s.done) return;
          var e = e1RM(s.w || 0, s.r || 0);
          if (e > best) best = e;
        });
      });
    });
  });
  return best;
}

function calcRecovery(exercises) {
  // Aggregate done sets per muscle group
  var groups = {};
  exercises.forEach(function(ex) {
    var g = exGroup(ex.name);
    if (!g) return;
    if (!groups[g]) groups[g] = {doneSets:0, totalReps:0, setCount:0, relSum:0, relCount:0};
    var exBest = null; // –ї–µ–љ–Є–≤—Л–є —А–∞—Б—З—С—В –ї—Г—З—И–µ–≥–Њ 1–Я–Ь –і–ї—П —Н—В–Њ–≥–Њ —Г–њ—А–∞–ґ–љ–µ–љ–Є—П
    (ex.sets||[]).forEach(function(s) {
      if (!s.done) return;
      groups[g].doneSets++;
      if (s.r) { groups[g].totalReps += s.r; groups[g].setCount++; }
      // –†–µ–∞–ї—М–љ–∞—П –Є–љ—В–µ–љ—Б–Є–≤–љ–Њ—Б—В—М –њ–Њ –≤–µ—Б—Г: % –Њ—В –ї—Г—З—И–µ–≥–Њ 1–Я–Ь –і–ї—П —Н—В–Њ–≥–Њ —Г–њ—А–∞–ґ–љ–µ–љ–Є—П
      if ((s.w||0) > 0 && (s.r||0) > 0) {
        if (exBest === null) exBest = bestE1RM(ex.name);
        if (exBest > 0) {
          var rel = s.w / exBest;
          if (rel > 1) rel = 1;
          groups[g].relSum += rel;
          groups[g].relCount++;
        }
      }
    });
  });

  var result = {};
  Object.keys(groups).forEach(function(g) {
    var d = groups[g];
    if (!d.doneSets) return;
    var base = BASE_RCV_H[g] || 48;

    // Volume modifier: –ї—С–≥–Ї–Є–є –Њ–±—К—С–Љ √Ч0.8 вЖТ —Н–Ї—Б—В—А–µ–Љ–∞–ї—М–љ—Л–є √Ч1.6
    var volMod;
    if      (d.doneSets <= 3)  volMod = 0.80;
    else if (d.doneSets <= 6)  volMod = 1.00;
    else if (d.doneSets <= 10) volMod = 1.20;
    else if (d.doneSets <= 15) volMod = 1.40;
    else                       volMod = 1.60;

    // Intensity modifier: –њ–Њ –†–Х–Р–Ы–ђ–Э–Ю–Ь–£ –≤–µ—Б—Г (% –Њ—В 1–Я–Ь), –Є–љ–∞—З–µ –Њ—В–Ї–∞—В –љ–∞ –њ–Њ–≤—В–Њ—А–µ–љ–Є—П
    var intMod;
    if (d.relCount > 0) {
      var pct = d.relSum / d.relCount; // —Б—А–µ–і–љ–Є–є —А–∞–±–Њ—З–Є–є –≤–µ—Б –Ї–∞–Ї –і–Њ–ї—П –Њ—В 1–Я–Ь
      if      (pct >= 0.90) intMod = 1.45; // ~–Љ–∞–Ї—Б–Є–Љ–∞–ї—М–љ–∞—П –љ–∞–≥—А—Г–Ј–Ї–∞
      else if (pct >= 0.825)intMod = 1.30;
      else if (pct >= 0.75) intMod = 1.18;
      else if (pct >= 0.65) intMod = 1.05;
      else if (pct >= 0.55) intMod = 0.95;
      else if (pct >= 0.40) intMod = 0.85;
      else                  intMod = 0.75; // —Б–Њ–≤—Б–µ–Љ –ї—С–≥–Ї–Є–є –і–µ–љ—М –Њ—В–љ–Њ—Б–Є—В–µ–ї—М–љ–Њ —Б–Є–ї—Л
    } else {
      var avgReps = d.setCount > 0 ? d.totalReps / d.setCount : 10;
      if      (avgReps <= 3)  intMod = 1.40;
      else if (avgReps <= 5)  intMod = 1.25;
      else if (avgReps <= 8)  intMod = 1.15;
      else if (avgReps <= 12) intMod = 1.00;
      else if (avgReps <= 20) intMod = 0.90;
      else                    intMod = 0.78;
    }

    var h = Math.round(base * volMod * intMod);
    result[g] = Math.max(18, Math.min(96, h));
  });
  return result; // {groupName: hours}
}

function getRecoveryEnd() {
  if (!ST.recovery || !ST.recovery.groups) return 0;
  var max = 0;
  Object.keys(ST.recovery.groups).forEach(function(g){ if (ST.recovery.groups[g] > max) max = ST.recovery.groups[g]; });
  return max;
}

function startRecovery() {
  // –С–µ—А—С–Љ –њ–Њ—Б–ї–µ–і–љ—О—О –Ј–∞–≤–µ—А—И—С–љ–љ—Г—О —В—А–µ–љ–Є—А–Њ–≤–Ї—Г (—Б–µ–≥–Њ–і–љ—П вЖТ –≤—З–µ—А–∞ вЖТ 2 –і–љ—П –љ–∞–Ј–∞–і)
  // –Є –Њ—В—Б—З–Є—В—Л–≤–∞–µ–Љ –≤–Њ—Б—Б—В–∞–љ–Њ–≤–ї–µ–љ–Є–µ –Ю–Ґ –Т–†–Х–Ь–Х–Э–Ш –Ю–Ъ–Ю–Э–І–Р–Э–Ш–ѓ —В—А–µ–љ–Є—А–Њ–≤–Ї–Є, –∞ –љ–µ –Њ—В –љ–∞–ґ–∞—В–Є—П –Ї–љ–Њ–њ–Ї–Є.
  var now = Date.now();
  var allEx = [], label = '', refMs = 0;
  var sources = [todayStr(), dateOffset(-1), dateOffset(-2)];
  for (var i = 0; i < sources.length; i++) {
    var ds = sources[i];
    var wkts = getWorkouts(ds).filter(function(w){
      return !w.planned && (w.exercises||[]).some(function(ex){ return (ex.sets||[]).some(function(s){ return s.done; }); });
    });
    if (wkts.length) {
      wkts.forEach(function(w) {
        label = label || w.name;
        var t = w.endTime || w.startTime || new Date(ds+'T18:00:00').getTime();
        if (t > refMs) refMs = t;
        (w.exercises||[]).forEach(function(ex){ allEx.push(ex); });
      });
      break;
    }
  }
  if (!allEx.length) { alert('–Э–µ—В –Ј–∞–≤–µ—А—И—С–љ–љ–Њ–є —В—А–µ–љ–Є—А–Њ–≤–Ї–Є –і–ї—П —А–∞—Б—З—С—В–∞'); return; }

  var groupHours = calcRecovery(allEx);
  if (!Object.keys(groupHours).length) { alert('–Э–µ—В –≤—Л–њ–Њ–ї–љ–µ–љ–љ—Л—Е –њ–Њ–і—Е–Њ–і–Њ–≤'); return; }

  if (!refMs || refMs > now) refMs = now;

  var groups = {}, maxEnd = 0;
  Object.keys(groupHours).forEach(function(g){
    var e = refMs + groupHours[g] * 3600000;
    groups[g] = e;
    if (e > maxEnd) maxEnd = e;
  });
  if (maxEnd <= now) { alert('–Я–Њ —А–∞—Б—З—С—В—Г –≤—Л —Г–ґ–µ –≤–Њ—Б—Б—В–∞–љ–Њ–≤–Є–ї–Є—Б—М рЯТ™'); return; }

  ST.recovery = { startMs: refMs, groups: groups, label: label };
  saveST();
  startRecoveryTimer();
  renderWorkout();
}

function clearRecovery() {
  ST.recovery = null; saveST();
  if (RCV_TIMER_ID) { clearInterval(RCV_TIMER_ID); RCV_TIMER_ID = null; }
  renderWorkout();
}

function startRecoveryTimer() {
  if (RCV_TIMER_ID) return;
  RCV_TIMER_ID = setInterval(function() {
    if (!ST.recovery) { clearInterval(RCV_TIMER_ID); RCV_TIMER_ID = null; return; }
    if (CUR_TAB === 'workout' && !ACTIVE_WKT) {
      // –Ю–±–љ–Њ–≤–ї—П–µ–Љ —В–Њ–ї—М–Ї–Њ —Б—З—С—В—З–Є–Ї–Є –±–µ–Ј –њ–Њ–ї–љ–Њ–≥–Њ —А–µ-—А–µ–љ–і–µ—А–∞
      var end = getRecoveryEnd();
      var rem = Math.max(0, end - Date.now());
      var el = document.getElementById('rcv-time-val');
      if (el) el.textContent = fmtRem(rem);
      var bar = document.getElementById('rcv-bar-fill');
      if (bar && ST.recovery) {

        bar.style.width = pct + '%';

      if (rem === 0) renderWorkout(); // –њ–µ—А–µ—А–Є—Б–Њ–≤–∞—В—М –њ—А–Є –Ј–∞–≤–µ—А—И–µ–љ–Є–Є
    }
  }, 60000);
}

function fmtRem(ms) {
  if (ms <= 0) return '0 –Љ–Є–љ';
  var h = Math.floor(ms / 3600000);
  var m = Math.floor((ms % 3600000) / 60000);
  return h > 0 ? h + ' —З ' + m + ' –Љ–Є–љ' : m + ' –Љ–Є–љ';
}

function renderRecoveryCard() {

  if (now >= end) {

  var h = '<div class="rcv-card">' +

      '<div class="rcv-badge">' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' +
        '–Я–µ—А–Є–Њ–і –≤–Њ—Б—Б—В–∞–љ–Њ–≤–ї–µ–љ–Є—П' +
      '</div>' +

    '<div class="rcv-time" id="rcv-time-val">'+fmtRem(rem)+'</div>' +
    '<div class="rcv-time-sub">–і–Њ –њ–Њ–ї–љ–Њ–≥–Њ –≤–Њ—Б—Б—В–∞–љ–Њ–≤–ї–µ–љ–Є—П</div>' +
    '<div class="rcv-bar-wrap"><div class="rcv-bar-fill" id="rcv-bar-fill" style="width:'+pct+'%"></div></div>' +
    '<div class="rcv-groups">';

  // –°–Њ—А—В–Є—А—Г–µ–Љ –≥—А—Г–њ–њ—Л –њ–Њ —Г–±—Л–≤–∞–љ–Є—О –Њ—Б—В–∞–≤—И–µ–≥–Њ—Б—П –≤—А–µ–Љ–µ–љ–Є
  var sorted = Object.keys(ST.recovery.groups).sort(function(a,b){ return ST.recovery.groups[b]-ST.recovery.groups[a]; });
  sorted.forEach(function(g) {
    var gEnd = ST.recovery.groups[g];
    var done = now >= gEnd;

    var gPct = done ? 100 : Math.min(100, Math.round((now-ST.recovery.startMs)/gDur*100));

      '<div class="rcv-grp-bar"><div class="rcv-grp-fill" style="width:'+gPct+'%;background:'+color+'"></div></div>' +
      '<div class="rcv-grp-rem">'+(done
        ? '<span style="color:var(--acc);font-weight:700">вЬУ –У–Њ—В–Њ–≤</span>'
        : fmtRem(gRem)
      )+'</div>' +
    '</div>';
  });

  h += '</div></div>';
  return h;
}

function dateOffset(days) {

function getTplMuscles(tpl) {

function getRecommendation() {
  var tired = {}, MAIN = ['–Э–Њ–≥–Є','–У—А—Г–і—М','–°–њ–Є–љ–∞','–Я–ї–µ—З–Є','–†—Г–Ї–Є'];
  for (var i = 1; i <= 2; i++) {
    var day = ST.w[dateOffset(-i)];
    if (!day || !day.workouts) continue;
    day.workouts.forEach(function(w) {
      (w.exercises||[]).forEach(function(ex) {
        var g = exGroup(ex.name);
        if (g && MAIN.indexOf(g) !== -1 && tired[g] === undefined) tired[g] = i;
      });

  function score(tpl) {
    var mm = getTplMuscles(tpl).filter(function(g){ return MAIN.indexOf(g) !== -1; });

    var s = 0;
    mm.forEach(function(g) {
      if (tired[g] === undefined) s += 3;
      else if (tired[g] === 2)    s += 1;
      else                         s -= 2; // –≤—З–µ—А–∞ вАФ —Г—Б—В–∞–ї

  return { tired: tired, rested: MAIN.filter(function(g){ return tired[g] === undefined; }), score: score };
}

function makeEx(name) {
  var cardio = isCardio(name);

  return {id:name, name:name, sets:sets, note:''};
}

  var title = repeatSrc ? 'рЯФБ –Я–Њ–≤—В–Њ—А–Є—В—М –љ–∞ –і–∞—В—Г' : '–Т—Л–±–µ—А–Є –і–∞—В—Г';
  var sub = repeatSrc ? '<div style="font-size:13px;color:var(--mut);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(repeatSrc.name)+' ¬Ј '+(repeatSrc.exercises||[]).length+' —Г–њ—А.</div>' : '';

  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9100;display:flex;align-items:flex-end;justify-content:center';

  overlay.innerHTML =
    '<div style="background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:480px;box-sizing:border-box">' +

        '<div style="min-width:0"><div style="font-size:17px;font-weight:800;color:var(--txt)">'+title+'</div>'+sub+'</div>' +
        '<button onclick="closePlanDateSheet()" style="background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:6px;line-height:1;-webkit-user-select:none;user-select:none">вЬХ</button>' +
      '</div>' +
      '<div class="drum-wrap" style="margin:0 16px">' +
        '<div class="drum-mask"></div>' +
        '<div class="drum-center" style="border-color:rgba(167,139,250,0.5);background:rgba(167,139,250,0.07)"></div>' +
        '<div class="drum" id="plan-date-drum">'+drumItems+'</div>' +
      '</div>' +
      '<div style="padding:12px 16px calc(env(safe-area-inset-bottom) + 12px)">' +
        '<button onclick="planDateConfirm()" style="width:100%;height:50px;border-radius:14px;background:var(--pur);color:#fff;font-size:16px;font-weight:700;border:none;font-family:inherit;cursor:pointer;-webkit-user-select:none;user-select:none">–Т—Л–±—А–∞—В—М –і–∞—В—Г</button>' +
      '</div>' +
    '</div>';

  overlay.addEventListener('click', function(e){ if (e.target === overlay) closePlanDateSheet(); });
  document.body.appendChild(overlay);

  // Track scroll to update selected index
  var drum = document.getElementById('plan-date-drum');
  drum.addEventListener('scroll', function() {
    window.__pdsIdx = Math.round(drum.scrollTop / 48);
  }, {passive: true});
}

function planDateConfirm() {
  var rep = window.__pdsRepeat;
  var ds = todayStr();
  var drum = document.getElementById('plan-date-drum');
  if (drum) {
    var idx = Math.round(drum.scrollTop / 48);
    var item = drum.children[idx];
    if (item) ds = item.getAttribute('data-ds');
  }
  closePlanDateSheet();
  if (rep) createPlanFromWorkout(rep, ds);
  else createPlan(window.__pdsTpl, ds);
}

function closePlanDateSheet() {
  var el = document.getElementById('plan-date-overlay');
  if (el) el.remove();
}

function createPlan(fromTpl, date) {
  date = date || todayStr();
  ensureDay(date);
  var wid = Date.now();
  var wkt = {id:wid, name: fromTpl ? fromTpl.name : '–Ґ—А–µ–љ–Є—А–Њ–≤–Ї–∞', loc: fromTpl ? (fromTpl.loc||'gym') : 'gym', planned:true, startTime:null, endTime:null, exercises:[]};
  if (fromTpl) {
    (fromTpl.exs||[]).forEach(function(e) {
      wkt.exercises.push(makeEx(typeof e === 'string' ? e : e.name));
    });
  }
  ST.w[date].workouts.push(wkt);
  saveST();
  PLAN_WKT = {date:date, wid:wid};
  OPEN_EX = {};
  // –Ш–Ј —И–∞–±–ї–Њ–љ–∞ вАФ —Б—А–∞–Ј—Г —А–∞—Б–Ї—А—Л–≤–∞–µ–Љ —Г–њ—А–∞–ґ–љ–µ–љ–Є—П, —З—В–Њ–±—Л –Є—Е –±—Л–ї–Њ –≤–Є–і–љ–Њ
  if (fromTpl) wkt.exercises.forEach(function(_, i){ OPEN_EX[i] = true; });
  renderTopbar(); renderWorkout();
}

// –Я–Њ–≤—В–Њ—А —В—А–µ–љ–Є—А–Њ–≤–Ї–Є: –Ї–Њ–њ–Є—А—Г–µ–Љ —Г–њ—А–∞–ґ–љ–µ–љ–Є—П —Б –≤–µ—Б–∞–Љ–Є/–њ–Њ–≤—В–Њ—А–∞–Љ–Є –Ї–∞–Ї –Њ—А–Є–µ–љ—В–Є—А
function repeatWorkout(date, wid) {
  var src = getWkt(date, wid);
  if (!src || !(src.exercises||[]).length) return;
  showPlanDateSheet(null, src);
}

function createPlanFromWorkout(src, date) {
  date = date || todayStr();
  ensureDay(date);
  var wid = Date.now();
  var wkt = {id:wid, name:src.name||'–Ґ—А–µ–љ–Є—А–Њ–≤–Ї–∞', loc:src.loc||'gym', planned:true, startTime:null, endTime:null, exercises:[]};
  (src.exercises||[]).forEach(function(ex) {
    var ne = {id:ex.name, name:ex.name, note:ex.note||'', sets:[]};
    (ex.sets||[]).forEach(function(s) {
      var ns = {};
      for (var k in s) if (s.hasOwnProperty(k)) ns[k] = s[k];
      ns.done = false;
      ne.sets.push(ns);
    });
    if (!ne.sets.length) ne = makeEx(ex.name);
    wkt.exercises.push(ne);
  });
  ST.w[date].workouts.push(wkt);
  saveST();
  PLAN_WKT = {date:date, wid:wid};
  OPEN_EX = {};
  goTab('workout');
  renderTopbar(); renderWorkout();
}

function openPlan(date, wid) {
  PLAN_WKT = {date:date, wid:wid};
  OPEN_EX = {};
  renderTopbar(); renderWorkout();
}

function closePlan() {
  PLAN_WKT = null;
  renderTopbar(); renderWorkout();
}

function deletePlan(date, wid) {
  if (!confirm('–£–і–∞–ї–Є—В—М –њ–ї–∞–љ —В—А–µ–љ–Є—А–Њ–≤–Ї–Є?')) return;
  if (!ST.w[date]) return;
  ST.w[date].workouts = (ST.w[date].workouts||[]).filter(function(w){ return w.id !== wid; });
  if (!ST.w[date].workouts.length && ST.w[date].type !== 'rest') delete ST.w[date];
  saveST();
  if (PLAN_WKT && PLAN_WKT.wid === wid) PLAN_WKT = null;
  renderTopbar(); renderWorkout();
}

function deleteWorkout(date, wid) {
  if (!confirm('–£–і–∞–ї–Є—В—М –Ј–∞–њ–Є—Б—М —В—А–µ–љ–Є—А–Њ–≤–Ї–Є?')) return;
  if (!ST.w[date]) return;
  ST.w[date].workouts = (ST.w[date].workouts||[]).filter(function(w){ return w.id !== wid; });
  if (!ST.w[date].workouts.length && ST.w[date].type !== 'rest') delete ST.w[date];
  saveST();
  renderWorkout();
}

function launchPlan(date, wid) {
  var wkt = getWkt(date, wid);
  if (!wkt) return;
  delete wkt.planned;
  wkt.startTime = Date.now();
  saveST();
  PLAN_WKT = null;
  ACTIVE_WKT = {date:date, wid:wid};
  WKT_START = Date.now();
  CUR_DATE = date;
  OPEN_EX = {};
  if (WKT_TIMER_ID) clearInterval(WKT_TIMER_ID);
  WKT_TIMER_ID = setInterval(tickWktTimer, 1000);
  renderTopbar(); renderWorkout();
}

function setPlanName(val) {
  if (!PLAN_WKT) return;
  var wkt = getWkt(PLAN_WKT.date, PLAN_WKT.wid);
  if (wkt) { wkt.name = val; saveST(); }
}

function setActiveName(val) {
  if (!ACTIVE_WKT) return;
  var wkt = getWkt(ACTIVE_WKT.date, ACTIVE_WKT.wid);
  if (wkt) { wkt.name = val; saveST(); }
}

// –Ю—В–Ї—А—Л—В—М –ї—О–±—Г—О —В—А–µ–љ–Є—А–Њ–≤–Ї—Г (–њ–ї–∞–љ/–Ј–∞–њ–Є—Б—М) –≤ —А–µ–і–∞–Ї—В–Њ—А–µ –Є–Ј –ї—О–±–Њ–є –≤–Ї–ї–∞–і–Ї–Є
function editWorkout(date, wid) {
  PLAN_WKT = {date:date, wid:wid};
  OPEN_EX = {};
  goTab('workout');
  renderTopbar(); renderWorkout();
}

function setPlanLoc(loc) {
  if (!PLAN_WKT) return;
  var wkt = getWkt(PLAN_WKT.date, PLAN_WKT.wid);
  if (wkt) { wkt.loc = loc; saveST(); renderWorkout(); }
}

function togglePlanEx(ei) {
  var body = document.getElementById('pex-body-'+ei);
  var chev = document.getElementById('pex-chev-'+ei);
  if (!body) return;
  var open = body.classList.toggle('open');
  if (chev) chev.classList.toggle('open');
  OPEN_EX[ei] = open;
}

function planExSummary(ex) {
  var s0 = ex.sets && ex.sets[0];
  if (!s0) return ex.sets.length + ' –њ–Њ–і—Е.';
  if (isSwim(ex.name))    return ex.sets.length + ' √Ч ' + (s0.dist||100) + ' –Љ' + (s0.secs ? ' ¬Ј ' + fmtTime(s0.secs) : '');
  if (isStatic(ex.name))  return ex.sets.length + ' √Ч ' + (s0.secs||60) + ' —Б–µ–Ї';
  if (isCardio(ex.name))  return ex.sets.length + ' √Ч ' + (s0.mins||20) + ' –Љ–Є–љ' + (s0.dist ? ' ¬Ј ' + s0.dist + ' –Ї–Љ' : '');
  return ex.sets.length + ' √Ч ' + (s0.r||0) + ' –њ–Њ–≤—В' + (s0.w ? ' ¬Ј ' + s0.w + ' –Ї–≥' : '');
}

    (wkt.planned ? '–°–Њ—Е—А–∞–љ–Є—В—М –њ–ї–∞–љ' : '–°–Њ—Е—А–∞–љ–Є—В—М –Ј–∞–њ–Є—Б—М') +

}

function startWorkout(fromTpl) {
  var date = todayStr();
  ensureDay(date);
  var wid = Date.now();
  var wkt = {id:wid, name:'–Ґ—А–µ–љ–Є—А–Њ–≤–Ї–∞', loc:'gym', startTime:Date.now(), exercises:[]};
  if (fromTpl) {
    wkt.name = fromTpl.name;
    wkt.loc = fromTpl.loc || 'gym';
    (fromTpl.exs || []).forEach(function(e) {
      var ex = makeEx(typeof e === 'string' ? e : e.name);
      if (typeof e === 'object' && e.sets) {
        var stat = isStatic(ex.name);
        var card = isCardio(ex.name);
        var swm  = isSwim(ex.name);
        ex.sets = [];
        for (var i = 0; i < e.sets; i++)
          ex.sets.push(stat ? {secs:e.reps||60,done:false} : swm ? {dist:e.reps||100, done:false} : card ? {w:0,r:0,dist:3,mins:e.reps||20,done:false} : {w:e.weight||0,r:e.reps||12,done:false});
      }
      wkt.exercises.push(ex);
    });
  }
  ST.w[date].workouts.push(wkt);
  saveST();
  ACTIVE_WKT = {date:date, wid:wid};
  WKT_START = Date.now();
  CUR_DATE = date;
  OPEN_EX = {};
  if (WKT_TIMER_ID) clearInterval(WKT_TIMER_ID);
  WKT_TIMER_ID = setInterval(tickWktTimer, 1000);
  goTab('workout');
}

function finishWorkout() {
  if (!ACTIVE_WKT) return;
  var wkt = getWkt(ACTIVE_WKT.date, ACTIVE_WKT.wid);
  if (wkt) wkt.endTime = Date.now();
  saveST();
  ACTIVE_WKT = null; WKT_START = null;
  if (WKT_TIMER_ID) { clearInterval(WKT_TIMER_ID); WKT_TIMER_ID = null; }
  renderTopbar(); renderWorkout();
}

function tickWktTimer() {
  if (!WKT_START) return;
  var el = document.getElementById('wkt-elapsed');
  if (el) el.textContent = fmtTime(Math.floor((Date.now()-WKT_START)/1000));
  var td = document.getElementById('wkt-timer-disp');
  if (td) td.textContent = fmtTime(Math.floor((Date.now()-WKT_START)/1000));
  updateVolBar();
}
function fmtTime(sec) { return Math.floor(sec/60)+':'+pad(sec%60); }

function updateVolBar() {
  if (!ACTIVE_WKT) return;
  var wkt = getWkt(ACTIVE_WKT.date, ACTIVE_WKT.wid);
  if (!wkt) return;
  var kg = 0, sets = 0;
  (wkt.exercises||[]).forEach(function(ex) {
    (ex.sets||[]).forEach(function(s){ if(s.done){ sets++; kg += (s.w||0)*(s.r||1); } });
  });
  var vkg = document.getElementById('vol-kg'); if (vkg) vkg.textContent = kg;
  var vs = document.getElementById('vol-sets'); if (vs) vs.textContent = sets;
}

function setWktLoc(loc) {
  var ref = curWktRef(); if (!ref) return;
  var wkt = getWkt(ref.date, ref.wid);
  if (!wkt) return;
  wkt.loc = loc; saveST(); renderWorkout();
}
